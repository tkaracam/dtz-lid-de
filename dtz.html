<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DTZ Hören Teil 1 | DTZ-LiD.de</title>
  <style>
    :root {
      --ora-bg: #f6fbff;
      --ora-surface-soft: #f8fcff;
      --ora-text: #1f3142;
      --ora-muted: #587089;
      --ora-stroke: #d8e7f5;
      --ora-accent-a: #ff8a57;
      --ora-accent-b: #ff5f7f;
      --ora-shadow: 0 16px 36px rgba(35, 71, 108, 0.12);
      --ora-menu-text: #2b445b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ora-text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        #f6fbff;
    }
    .page-shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 90px) 0 60px;
    }
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-width: none;
      z-index: 1004;
      border-top: 1px solid var(--ora-stroke);
      border-bottom: 1px solid var(--ora-stroke);
      border-left: 0;
      border-right: 0;
      border-radius: 0;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) clamp(22px, 3.2vw, 38px) 14px clamp(10px, 1.4vw, 18px);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .nav-brand {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 1.08rem;
      color: #1f3347;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-quick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .quick-btn {
      text-decoration: none;
      color: var(--ora-menu-text);
      border: 1px solid var(--ora-stroke);
      background: var(--ora-surface-soft);
      padding: 6px 8px;
      border-radius: 10px;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1;
    }
    .quick-btn-primary {
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      border-color: transparent;
    }
    .card {
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--ora-stroke);
      background: linear-gradient(160deg, #ffffff, #f5faff);
      padding: 22px;
      box-shadow: var(--ora-shadow);
      max-width: 860px;
    }
    h1 { margin-top: 0; }
    .status {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #b8d5ec;
      background: #f3f9ff;
      color: #2e4c67;
      display: none;
    }
    .task {
      margin-top: 12px;
      border: 1px solid #d8e7f5;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
    }
    .task-title {
      margin: 0 0 8px;
    }
    .task-option {
      display: block;
      margin: 6px 0;
      padding: 8px 10px;
      border: 1px solid #e2edf8;
      border-radius: 8px;
      background: #fbfdff;
      color: #2b445b;
    }
    .audio-row {
      margin: 8px 0 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .audio-btn {
      min-height: 34px;
      border-radius: 9px;
      border: 1px solid #cfe2f2;
      background: #f8fcff;
      color: #1f3347;
      font: inherit;
      font-weight: 700;
      padding: 6px 10px;
      cursor: pointer;
      width: 100%;
      display: block;
    }
    .audio-btn.playing {
      border-color: #ffb69b;
      background: #fff4ef;
      color: #8e3a1d;
    }
    .audio-hint {
      font-size: 0.82rem;
      color: var(--ora-muted);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .primary-btn {
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 8px 14px;
      font: inherit;
      font-weight: 700;
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      cursor: pointer;
      width: 100%;
      display: block;
    }
    .coffee-cta-wrap {
      max-width: 860px;
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .coffee-orakel-btn {
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 8px 14px;
      font: inherit;
      font-weight: 700;
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      cursor: pointer;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .coffee-orakel-btn:hover {
      color: #210f1a;
    }
    .section-trigger {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .section-trigger h1 {
      margin: 0;
    }
    .section-trigger::after {
      content: "-";
      font-size: 1.2rem;
      line-height: 1;
      color: #3f5f80;
      font-weight: 700;
    }
    .card.section-collapsed .section-trigger::after {
      content: "+";
    }
    .section-panel {
      margin-top: 12px;
    }
    .card.section-collapsed .section-panel {
      display: none;
    }
    .site-footer {
      margin-top: 26px;
      border-top: 1px solid var(--ora-stroke);
      padding-top: 18px;
      color: var(--ora-muted);
      text-align: center;
    }
    .footer-link {
      color: #35506a;
      border: 1px solid #cfe2f2;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      background: #ffffff;
      text-decoration: none;
      display: inline-flex;
    }
    @media (max-width: 820px) {
      .coffee-cta-wrap {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .coffee-orakel-btn {
        width: 100%;
      }
    }
  </style>
  <script defer src="/assets/site-shell.js"></script>
</head>
<body>
  <div class="page-shell">
    <nav class="top-nav">
      <a class="nav-brand" href="./index.html">DTZ-LiD</a>
      <div class="nav-quick">
        <a class="quick-btn" href="./member.html?mode=login">Anmelden</a>
        <a class="quick-btn quick-btn-primary" href="./register.html">Registrieren</a>
      </div>
    </nav>

    <main>
      <div class="coffee-cta-wrap">
        <a class="coffee-orakel-btn" href="./h.html">H</a>
        <a class="coffee-orakel-btn" href="./l.html">L</a>
        <a class="coffee-orakel-btn" href="./sch.html">Sch</a>
        <a class="coffee-orakel-btn" href="./spr.html">Spr</a>
      </div>
    </main>

    <footer class="site-footer">
      <a class="footer-link" href="./agb.html">AGB</a>
    </footer>
  </div>

  <script>
    
  </script>
</body>
</html>
