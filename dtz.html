<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DTZ Hören Teil 1 | DTZ-LiD.de</title>
  <style>
    :root {
      --ora-bg: #f6fbff;
      --ora-surface-soft: #f8fcff;
      --ora-text: #1f3142;
      --ora-muted: #587089;
      --ora-stroke: #d8e7f5;
      --ora-accent-a: #ff8a57;
      --ora-accent-b: #ff5f7f;
      --ora-shadow: 0 16px 36px rgba(35, 71, 108, 0.12);
      --ora-menu-text: #2b445b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ora-text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        #f6fbff;
    }
    .page-shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 90px) 0 60px;
    }
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-width: none;
      z-index: 1004;
      border-top: 1px solid var(--ora-stroke);
      border-bottom: 1px solid var(--ora-stroke);
      border-left: 0;
      border-right: 0;
      border-radius: 0;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) clamp(22px, 3.2vw, 38px) 14px clamp(10px, 1.4vw, 18px);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .nav-brand {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 1.08rem;
      color: #1f3347;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-quick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .quick-btn {
      text-decoration: none;
      color: var(--ora-menu-text);
      border: 1px solid var(--ora-stroke);
      background: var(--ora-surface-soft);
      padding: 6px 8px;
      border-radius: 10px;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1;
    }
    .quick-btn-primary {
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      border-color: transparent;
    }
    .card {
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--ora-stroke);
      background: linear-gradient(160deg, #ffffff, #f5faff);
      padding: 22px;
      box-shadow: var(--ora-shadow);
      max-width: 860px;
    }
    h1 { margin-top: 0; }
    .status {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #b8d5ec;
      background: #f3f9ff;
      color: #2e4c67;
      display: none;
    }
    .task {
      margin-top: 12px;
      border: 1px solid #d8e7f5;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
    }
    .task-title {
      margin: 0 0 8px;
    }
    .task-option {
      display: block;
      margin: 6px 0;
      padding: 8px 10px;
      border: 1px solid #e2edf8;
      border-radius: 8px;
      background: #fbfdff;
      color: #2b445b;
    }
    .audio-row {
      margin: 8px 0 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .audio-btn {
      min-height: 34px;
      border-radius: 9px;
      border: 1px solid #cfe2f2;
      background: #f8fcff;
      color: #1f3347;
      font: inherit;
      font-weight: 700;
      padding: 6px 10px;
      cursor: pointer;
      width: 100%;
      display: block;
    }
    .audio-btn.playing {
      border-color: #ffb69b;
      background: #fff4ef;
      color: #8e3a1d;
    }
    .audio-hint {
      font-size: 0.82rem;
      color: var(--ora-muted);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .primary-btn {
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 8px 14px;
      font: inherit;
      font-weight: 700;
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      cursor: pointer;
      width: 100%;
      display: block;
    }
    .section-trigger {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .section-trigger h1 {
      margin: 0;
    }
    .section-trigger::after {
      content: "-";
      font-size: 1.2rem;
      line-height: 1;
      color: #3f5f80;
      font-weight: 700;
    }
    .card.section-collapsed .section-trigger::after {
      content: "+";
    }
    .section-panel {
      margin-top: 12px;
    }
    .card.section-collapsed .section-panel {
      display: none;
    }
    .site-footer {
      margin-top: 26px;
      border-top: 1px solid var(--ora-stroke);
      padding-top: 18px;
      color: var(--ora-muted);
      text-align: center;
    }
    .footer-link {
      color: #35506a;
      border: 1px solid #cfe2f2;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      background: #ffffff;
      text-decoration: none;
      display: inline-flex;
    }
  </style>
  <script defer src="/assets/site-shell.js"></script>
</head>
<body>
  <div class="page-shell">
    <nav class="top-nav">
      <a class="nav-brand" href="./index.html">DTZ-LiD</a>
      <div class="nav-quick">
        <a class="quick-btn" href="./member.html?mode=login">Anmelden</a>
        <a class="quick-btn quick-btn-primary" href="./register.html">Registrieren</a>
      </div>
    </nav>

    <main>
      <section id="hoerenSection" class="card">
        <button id="hoerenSectionToggle" class="section-trigger" type="button" aria-expanded="true">
          <h1>Hören Teil 1</h1>
        </button>
        <div class="section-panel">
          <div class="actions">
            <button class="primary-btn js-reload-btn" type="button">Neue Aufgaben laden</button>
          </div>
          <div id="statusBox" class="status"></div>
          <div id="taskList"></div>
          <div class="actions">
            <button class="primary-btn js-reload-btn" type="button">Neue Aufgaben laden</button>
          </div>
        </div>
      </section>
      <section class="card">
        <h1>Neue Sekme</h1>
      </section>
    </main>

    <footer class="site-footer">
      <a class="footer-link" href="./agb.html">AGB</a>
    </footer>
  </div>

  <script>
    let currentSpeechBtn = null;
    let currentAudioPlayer = null;
    let currentPlaybackToken = 0;
    const audioCache = new Map();

    function setStatus(message, isError) {
      const box = document.getElementById("statusBox");
      if (!box) return;
      box.style.display = message ? "block" : "none";
      box.textContent = message || "";
      box.style.borderColor = isError ? "#f3c1c6" : "#b8d5ec";
      box.style.background = isError ? "#fdecee" : "#f3f9ff";
      box.style.color = isError ? "#7a1f24" : "#2e4c67";
    }

    function renderTasks(payload) {
      const list = document.getElementById("taskList");
      if (!list) return;
      list.innerHTML = "";
      const set = payload && payload.set ? payload.set : {};
      const items = Array.isArray(set.items) ? set.items : [];
      if (!items.length) {
        setStatus("Hören Teil 1 görevleri bulunamadı.", true);
        return;
      }

      const first = items[0] || {};
      const questions = Array.isArray(first.questions) ? first.questions : [];
      if (!questions.length) {
        setStatus("Bu sette soru yok.", true);
        return;
      }

      questions.forEach((q, idx) => {
        const wrap = document.createElement("section");
        wrap.className = "task";

        const title = document.createElement("p");
        title.className = "task-title";
        title.textContent = `${idx + 1}. ${String(q.question || "Soru")}`;
        wrap.appendChild(title);

        const audioScript = String(q && q.audio_script ? q.audio_script : "").trim();
        if (audioScript) {
          const audioRow = document.createElement("div");
          audioRow.className = "audio-row";

          const audioBtn = document.createElement("button");
          audioBtn.className = "audio-btn";
          audioBtn.type = "button";
          audioBtn.textContent = "Audio abspielen";
          audioBtn.addEventListener("click", async () => {
            const stopCurrent = () => {
              currentPlaybackToken += 1;
              if (currentAudioPlayer) {
                try { currentAudioPlayer.pause(); } catch (_) {}
              }
              if (currentSpeechBtn) {
                currentSpeechBtn.classList.remove("playing");
                currentSpeechBtn.textContent = "Audio abspielen";
              }
              currentAudioPlayer = null;
              currentSpeechBtn = null;
            };

            if (currentSpeechBtn === audioBtn) {
              stopCurrent();
              return;
            }

            stopCurrent();
            audioBtn.classList.add("playing");
            audioBtn.textContent = "Audio stoppen";
            currentSpeechBtn = audioBtn;
            const token = currentPlaybackToken;

            try {
              let segments = audioCache.get(audioScript);
              if (!segments) {
                const response = await fetch("./api/dtz_tts_public.php", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ script: audioScript })
                });
                const payload = await response.json().catch(() => ({}));
                if (!response.ok || !payload.ok) {
                  throw new Error(String(payload.error || `Fehler: ${response.status}`));
                }
                segments = Array.isArray(payload.segments) ? payload.segments : [];
                audioCache.set(audioScript, segments);
              }

              if (!segments.length) {
                throw new Error("Ses segmenti üretilemedi.");
              }

              for (const seg of segments) {
                if (token !== currentPlaybackToken) return;
                const url = String(seg && seg.url ? seg.url : "");
                if (!url) continue;
                const audio = new Audio(url);
                currentAudioPlayer = audio;
                await new Promise((resolve, reject) => {
                  audio.onended = resolve;
                  audio.onerror = () => reject(new Error("Audio-Stream konnte nicht abgespielt werden."));
                  audio.play().catch(reject);
                });
                const pause = Math.max(0, Number(seg && seg.pause_ms ? seg.pause_ms : 0));
                if (pause > 0) {
                  await new Promise(resolve => setTimeout(resolve, pause));
                }
              }
            } catch (err) {
              setStatus(`Audio yüklenemedi: ${String(err && err.message ? err.message : err)}`, true);
            } finally {
              if (token === currentPlaybackToken && currentSpeechBtn === audioBtn) {
                audioBtn.classList.remove("playing");
                audioBtn.textContent = "Audio abspielen";
                currentSpeechBtn = null;
                currentAudioPlayer = null;
              }
            }
          });

          audioRow.appendChild(audioBtn);
          wrap.appendChild(audioRow);
        }

        const options = q && typeof q.options === "object" ? q.options : {};
        Object.keys(options).forEach(key => {
          const row = document.createElement("div");
          row.className = "task-option";
          row.textContent = `${key}) ${String(options[key] || "")}`;
          wrap.appendChild(row);
        });
        list.appendChild(wrap);
      });

      setStatus("", false);
    }

    async function loadHoerenTeil1() {
      setStatus("", false);
      try {
        const response = await fetch("./api/dtz_hoeren_teil1_public.php", { method: "GET" });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.ok) {
          throw new Error(String(payload.error || `Fehler: ${response.status}`));
        }
        renderTasks(payload);
      } catch (err) {
        setStatus(`Hören Teil 1 yüklenemedi: ${String(err && err.message ? err.message : err)}`, true);
      }
    }

    document.querySelectorAll(".js-reload-btn").forEach(btn => {
      btn.addEventListener("click", () => { void loadHoerenTeil1(); });
    });

    const hoerenSection = document.getElementById("hoerenSection");
    const hoerenSectionToggle = document.getElementById("hoerenSectionToggle");
    if (hoerenSection && hoerenSectionToggle) {
      hoerenSectionToggle.addEventListener("click", () => {
        const collapsed = hoerenSection.classList.toggle("section-collapsed");
        hoerenSectionToggle.setAttribute("aria-expanded", String(!collapsed));
      });
    }

    void loadHoerenTeil1();
  </script>
</body>
</html>
