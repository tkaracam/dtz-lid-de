<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <!-- Security Headers -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/frontend/img/icon-192x192.png">
    <title>Registrieren - DTZ Lernplattform</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .auth-box {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--glass-border);
        }
        
        .auth-box h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
        }
        
        .auth-box p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .btn-full {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
        }
        
        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
        }
        
        .auth-links a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .error-message {
            color: #ff4757;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            color: #2ed573;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .logo svg {
            width: 64px;
            height: 64px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <svg viewBox="0 0 64 64" fill="none">
                    <circle cx="32" cy="32" r="30" stroke="url(#grad)" stroke-width="2"/>
                    <path d="M20 32h24M32 20v24" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>Konto erstellen</h1>
            <p>7 Tage kostenlos testen</p>
            
            <form id="register-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="input" id="name" required placeholder="Ihr Name">
                </div>
                
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" class="input" id="email" required placeholder="ihre@email.de">
                </div>
                
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" class="input" id="password" required placeholder="••••••••" minlength="8">
                    <small style="color: var(--text-muted);">Mindestens 8 Zeichen</small>
                </div>
                
                <div class="error-message" id="error"></div>
                <div class="success-message" id="success"></div>
                
                <button type="submit" class="btn btn-primary btn-full">Kostenlos registrieren</button>
            </form>
            
            <div class="auth-links">
                Bereits registriert? <a href="login.html">Anmelden</a>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/security.js"></script>
    <script>
        // Check if API_BASE is defined
        if (typeof API_BASE === 'undefined') {
            console.error('API_BASE is not defined! Check if config.js loaded correctly.');
            window.API_BASE = window.location.hostname === 'localhost' 
                ? 'http://localhost:8080/api' 
                : '/api';
        }
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // XSS Protection: Sanitize inputs
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            const name = Security.sanitizeInput(nameInput.value).trim();
            const email = Security.sanitizeInput(emailInput.value).trim();
            const password = passwordInput.value; // Don't sanitize password
            
            // Client-side validation
            if (name.length < 2 || name.length > 100) {
                alert('Name muss zwischen 2 und 100 Zeichen lang sein');
                return;
            }
            
            if (!Security.isValidEmail(email)) {
                alert('Bitte geben Sie eine gültige E-Mail-Adresse ein');
                return;
            }
            
            // Password strength validation
            const passwordCheck = Security.validatePassword(password);
            if (!passwordCheck.valid) {
                alert('Passwort ist zu schwach:\n- ' + passwordCheck.errors.join('\n- '));
                return;
            }
            
            // Check for suspicious input
            if (Security.isSuspiciousInput(name) || Security.isSuspiciousInput(email)) {
                alert('Ungültige Eingabe');
                return;
            }
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            
            errorEl.classList.remove('show');
            successEl.classList.remove('show');
            
            // Client-side validation
            if (!name || !email || !password) {
                errorEl.textContent = 'Bitte füllen Sie alle Felder aus';
                errorEl.classList.add('show');
                return;
            }
            
            if (password.length < 8) {
                errorEl.textContent = 'Passwort muss mindestens 8 Zeichen lang sein';
                errorEl.classList.add('show');
                return;
            }
            
            console.log('Registering with:', { name, email, apiBase: API_BASE });
            
            try {
                const response = await fetch(`${API_BASE}/auth/register.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successEl.textContent = 'Registrierung erfolgreich! Weiterleitung...';
                    successEl.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    errorEl.textContent = data.error || 'Registrierung fehlgeschlagen';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                console.error('Registration error:', err);
                errorEl.textContent = 'Verbindungsfehler: ' + err.message;
                errorEl.classList.add('show');
            }
        });
    </script>
<script src="js/db.js"></script>
    <script src="js/lazy-load.js"></script>
    <script src="js/performance.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
