<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lernen - DTZ Lernplattform</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/frontend/img/icon-192x192.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
        }
        
        .sidebar-logo {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 0.5rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(124, 92, 255, 0.2);
            color: var(--accent);
        }
        
        .main-content {
            padding: 2rem;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 {
            font-size: 1.75rem;
        }
        
        .module-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .module-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .module-btn:hover, .module-btn.active {
            border-color: var(--accent);
            background: rgba(124, 92, 255, 0.1);
        }
        
        .module-btn .icon {
            font-size: 1.5rem;
        }
        
        .teil-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .teil-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .teil-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        
        .teil-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .teil-number {
            background: var(--accent);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .teil-level {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .teil-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .teil-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .teil-progress {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            min-width: 50px;
            text-align: right;
        }
        
        .question-area {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
            display: none;
        }
        
        .question-area.active {
            display: block;
        }
        
        .audio-player {
            background: rgba(124, 92, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .audio-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .audio-btn:hover {
            transform: scale(1.1);
        }

        .audio-btn.playing {
            background: linear-gradient(135deg, #16a34a, #22c55e);
        }
        
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .question-rich {
            display: grid;
            gap: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .question-panel {
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 0.95rem 1.05rem;
        }
        
        .question-panel-title {
            display: inline-block;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.55rem;
        }
        
        .question-lines {
            display: grid;
            gap: 0.4rem;
            font-size: 0.98rem;
            line-height: 1.42;
        }

        .source-wayfinder {
            display: grid;
            gap: 0.55rem;
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid rgba(96, 165, 250, 0.35);
            background:
                linear-gradient(180deg, rgba(30, 64, 175, 0.25), rgba(15, 23, 42, 0.22)),
                repeating-linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.03) 0,
                    rgba(255, 255, 255, 0.03) 8px,
                    rgba(255, 255, 255, 0.01) 8px,
                    rgba(255, 255, 255, 0.01) 16px
                );
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), 0 10px 28px rgba(2, 6, 23, 0.35);
        }

        .source-wayfinder-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.45rem 0.6rem;
            border-radius: 8px;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.35), rgba(37, 99, 235, 0.2));
            border: 1px solid rgba(147, 197, 253, 0.35);
            margin-bottom: 0.35rem;
        }

        .source-wayfinder-header-title {
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #dbeafe;
        }

        .source-wayfinder-header-sub {
            font-size: 0.75rem;
            color: #bfdbfe;
        }

        .source-wayfinder-row {
            display: grid;
            grid-template-columns: 92px 1fr 30px;
            gap: 0.55rem;
            align-items: center;
            padding: 0.45rem 0.55rem;
            border-radius: 8px;
            background: linear-gradient(90deg, rgba(15, 23, 42, 0.75), rgba(30, 41, 59, 0.72));
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        .source-wayfinder-level {
            font-weight: 700;
            color: #dbeafe;
            text-align: center;
            border-right: 1px solid rgba(148, 163, 184, 0.35);
            padding-right: 0.35rem;
        }

        .source-wayfinder-items {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #e2e8f0;
        }

        .source-wayfinder-arrow {
            text-align: center;
            font-size: 1.05rem;
            color: #93c5fd;
            font-weight: 700;
        }

        .source-info-list {
            display: grid;
            gap: 0.55rem;
        }

        .source-info-card {
            padding: 0.55rem 0.65rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.04);
        }

        .source-info-label {
            font-weight: 700;
            color: var(--accent);
            margin-right: 0.35rem;
        }

        .question-source-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.45rem;
        }

        .question-source-body {
            font-size: 0.98rem;
            line-height: 1.55;
            color: var(--text);
        }
        
        .question-main {
            font-size: 1.03rem;
            line-height: 1.5;
            font-weight: 600;
        }
        
        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .answer-option {
            padding: 1rem 1.25rem;
            border: 2px solid var(--glass-border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .answer-option:hover {
            border-color: var(--accent);
            background: rgba(124, 92, 255, 0.1);
        }
        
        .answer-option.selected {
            border-color: var(--accent);
            background: rgba(124, 92, 255, 0.2);
        }
        
        .answer-option.correct {
            border-color: #2ed573;
            background: rgba(46, 213, 115, 0.2);
        }
        
        .answer-option.wrong {
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.2);
        }
        
        .feedback-box {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: 10px;
            display: none;
        }
        
        .feedback-box.show {
            display: block;
        }
        
        .feedback-box.correct {
            background: rgba(46, 213, 115, 0.1);
            border-left: 4px solid #2ed573;
        }
        
        .feedback-box.wrong {
            background: rgba(255, 71, 87, 0.1);
            border-left: 4px solid #ff4757;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }
        
        .btn-nav {
            padding: 0.75rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-nav:hover {
            border-color: var(--accent);
        }
        
        .btn-check {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 92, 255, 0.3);
        }
        
        .stats-bar {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--glass-bg);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .stat-value {
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .teil-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">DTZ Learning</div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="learn.html" class="nav-link active">📚 Lernen</a>
                    </li>
                    <li class="nav-item">
                        <a href="modelltest.html" class="nav-link">📝 Modelltest</a>
                    </li>
                    <li class="nav-item">
                        <a href="writing.html" class="nav-link">✍️ Schreiben</a>
                    </li>
                    <li class="nav-item">
                        <a href="progress.html" class="nav-link">📈 Fortschritt</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" onclick="logout()" class="nav-link">🚪 Abmelden</a>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="header">
                <h1>📚 Lernen</h1>
            </div>
            
            <div class="module-selector" id="module-selector">
                <button class="module-btn" data-module="hoeren" onclick="selectModule('hoeren')">
                    <span class="icon">🎧</span>
                    <span>Hören</span>
                </button>
                <button class="module-btn" data-module="lesen" onclick="selectModule('lesen')">
                    <span class="icon">📖</span>
                    <span>Lesen</span>
                </button>
                <button class="module-btn" data-module="sprechen" onclick="selectModule('sprechen')">
                    <span class="icon">🗣️</span>
                    <span>Sprechen</span>
                </button>
            </div>
            
            <div class="stats-bar" id="stats-bar" style="display: none;">
                <div class="stat-item">
                    <span class="stat-label">Frage:</span>
                    <span class="stat-value" id="current-q">1</span>
                    <span class="stat-label">/</span>
                    <span class="stat-value" id="total-q">10</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Richtig:</span>
                    <span class="stat-value" id="correct-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Serie:</span>
                    <span class="stat-value" id="streak-count">0</span>
                    <span>🔥</span>
                </div>
            </div>
            
            <div class="teil-grid" id="teil-grid">
                <!-- Teile will be loaded here -->
            </div>
            
            <div class="question-area" id="question-area">
                <div class="audio-player" id="audio-player" style="display: none;">
                    <button id="audioBtn" class="audio-btn" onclick="playAudio()">▶️</button>
                    <div>
                        <div style="font-weight: 600;">🎧 Audio abspielen</div>
                        <div id="audioStatus" style="font-size: 0.875rem; color: var(--text-muted);">Klicken Sie zum Hören</div>
                    </div>
                </div>
                
                <div class="question-text" id="question-text"></div>
                
                <div class="answer-options" id="answer-options"></div>
                
                <div class="feedback-box" id="feedback-box">
                    <div id="feedback-text"></div>
                </div>
                
                <div class="nav-buttons">
                    <button class="btn-nav" onclick="previousQuestion()">← Zurück</button>
                    <button class="btn-check" onclick="checkAnswer()">Überprüfen</button>
                    <button class="btn-nav" onclick="nextQuestion()">Weiter →</button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        
        let currentModule = null;
        let currentTeil = null;
        let currentQuestion = 0;
        let questions = [];
        let selectedAnswer = null;
        let correctCount = 0;
        let streak = 0;
        let answered = false;
        let currentAudioText = '';
        let currentPlaybackToken = 0;
        let currentAudioPlayer = null;
        let currentTtsSegments = [];
        
        const moduleInfo = {
            hoeren: {
                name: 'Hören',
                icon: '🎧',
                teile: [
                    { num: 1, name: 'Telefonansagen', desc: 'Anrufbeantworter, Durchsagen', level: 'A2', questions: 5 },
                    { num: 2, name: 'Alltagsgespräche', desc: 'Gespräche im Alltag', level: 'A2', questions: 5 },
                    { num: 3, name: 'Interviews', desc: 'Berufs- und Arbeitsgespräche', level: 'B1', questions: 5 },
                    { num: 4, name: 'Information', desc: 'Rundfunk, Nachrichten', level: 'B1', questions: 5 }
                ]
            },
            lesen: {
                name: 'Lesen',
                icon: '📖',
                teile: [
                    { num: 1, name: 'Anzeigen', desc: 'Kleinanzeigen, Aushänge', level: 'A2', questions: 5 },
                    { num: 2, name: 'Alltagstexte', desc: 'Briefe, E-Mails, Hinweise', level: 'A2', questions: 5 },
                    { num: 3, name: 'Arbeitswelttexte', desc: 'Stellenanzeigen, Verträge', level: 'B1', questions: 5 },
                    { num: 4, name: 'Komplexe Texte', desc: 'Zeitungsartikel, Informationen', level: 'B1', questions: 5 },
                    { num: 5, name: 'Mehrere Texte', desc: 'Vergleichen, Zuordnen', level: 'B1', questions: 5 }
                ]
            },
            sprechen: {
                name: 'Sprechen',
                icon: '🗣️',
                teile: [
                    { num: 1, name: 'Sich vorstellen', desc: 'Über sich selbst sprechen', level: 'A2', questions: 4 },
                    { num: 2, name: 'Thema erzählen', desc: 'Bildbeschreibung, Geschichte', level: 'B1', questions: 4 },
                    { num: 3, name: 'Diskussion', desc: 'Meinung äußern, argumentieren', level: 'B1', questions: 4 }
                ]
            }
        };
        
        // Check URL params for module
        const urlParams = new URLSearchParams(window.location.search);
        const moduleParam = urlParams.get('module');
        if (moduleParam && moduleInfo[moduleParam]) {
            selectModule(moduleParam);
        }
        
        function selectModule(module) {
            currentModule = module;
            currentTeil = null;
            currentQuestion = 0;
            
            // Update UI
            document.querySelectorAll('.module-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.module === module) {
                    btn.classList.add('active');
                }
            });
            
            // Show teile
            const info = moduleInfo[module];
            const grid = document.getElementById('teil-grid');
            
            grid.innerHTML = info.teile.map(teil => `
                <div class="teil-card" onclick="selectTeil(${teil.num})">
                    <div class="teil-header">
                        <span class="teil-number">Teil ${teil.num}</span>
                        <span class="teil-level">${teil.level}</span>
                    </div>
                    <div class="teil-title">${teil.name}</div>
                    <div class="teil-desc">${teil.desc}</div>
                    <div class="teil-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 0%"></div>
                        </div>
                        <span class="progress-text">0/${teil.questions}</span>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('question-area').classList.remove('active');
            document.getElementById('stats-bar').style.display = 'none';
        }
        
        async function selectTeil(teilNum) {
            currentTeil = teilNum;
            currentQuestion = 0;
            correctCount = 0;
            streak = 0;
            
            // Load questions from API
            await loadQuestions();
            
            // Show question area
            document.getElementById('teil-grid').innerHTML = '';
            document.getElementById('question-area').classList.add('active');
            document.getElementById('stats-bar').style.display = 'flex';
            
            updateStats();
            showQuestion();
        }
        
        async function loadQuestions() {
            try {
                if (currentModule === 'sprechen') {
                    questions = buildSprechenTasks(currentTeil);
                    return;
                }
                if (currentModule !== 'hoeren' && currentModule !== 'lesen') {
                    questions = [];
                    return;
                }
                const response = await fetch(`${API_BASE}/dtz_${currentModule}_teil${currentTeil}_public.php`);
                const data = await response.json().catch(() => ({}));
                const parsed = parseDtzQuestions(currentModule, currentTeil, data);
                if (!parsed.length) {
                    throw new Error('Keine DTZ-Fragen gefunden.');
                }
                questions = parsed;
            } catch (err) {
                console.error('Failed to load questions:', err);
                questions = [];
                document.getElementById('question-text').textContent = 'Fragen konnten nicht geladen werden.';
                document.getElementById('answer-options').innerHTML = '';
            }
        }

        function buildSprechenTasks(teil) {
            if (teil === 1) {
                return [
                    {
                        id: 'spr1_1',
                        question_text: 'Sie stellen sich in der Prüfung kurz vor. Welche Antwort passt am besten auf die Frage: "Wie lange leben Sie schon in Deutschland?"',
                        options: {
                            A: 'Ich lebe seit drei Jahren in Deutschland.',
                            B: 'Deutschland ist ein großes Land in Europa.',
                            C: 'Meine Lieblingsfarbe ist Blau.'
                        },
                        correct: 'A',
                        explanation: 'Teil 1: kurze, direkte Information zur Person geben.'
                    },
                    {
                        id: 'spr1_2',
                        question_text: 'Welche Struktur ist in Teil 1 am besten?',
                        options: {
                            A: 'Name, Herkunft, Beruf, Familie, Sprachen, Hobby',
                            B: 'Nur das Hobby sehr lange erklären',
                            C: 'Gar nichts sagen und auf die nächste Frage warten'
                        },
                        correct: 'A',
                        explanation: 'Teil 1 folgt einer klaren Vorstellungsstruktur.'
                    }
                ];
            }
            if (teil === 2) {
                return [
                    {
                        id: 'spr2_1',
                        question_text: 'Bildbeschreibung (Teil 2): Was ist ein guter Einstieg?',
                        options: {
                            A: 'Auf dem Bild sehe ich ...',
                            B: 'Ich weiß es nicht.',
                            C: 'Nächste Frage bitte.'
                        },
                        correct: 'A',
                        explanation: 'Mit einer klaren Beschreibung starten, dann Details nennen.'
                    },
                    {
                        id: 'spr2_2',
                        question_text: 'Nach der Beschreibung sollen Sie eigene Erfahrungen nennen. Welche Aussage passt?',
                        options: {
                            A: 'In meinem Alltag ist das ähnlich, weil ...',
                            B: 'Ich möchte darüber nicht sprechen.',
                            C: 'Das ist egal.'
                        },
                        correct: 'A',
                        explanation: 'DTZ Teil 2 verlangt Bezug zur eigenen Situation.'
                    }
                ];
            }
            return [
                {
                    id: 'spr3_1',
                    question_text: 'Teil 3 (gemeinsam planen): Was ist kommunikativ am besten?',
                    options: {
                        A: 'Wir könnten am Samstag um 10 Uhr starten. Passt dir das?',
                        B: 'Ich entscheide alles alleine.',
                        C: 'Wir sprechen nicht über Details.'
                    },
                    correct: 'A',
                    explanation: 'Vorschlag machen, nachfragen, gemeinsam entscheiden.'
                },
                {
                    id: 'spr3_2',
                    question_text: 'Welche Formulierung zeigt gute Kooperation?',
                    options: {
                        A: 'Was hältst du davon, wenn wir ...?',
                        B: 'Du musst das so machen.',
                        C: 'Mir ist alles egal.'
                    },
                    correct: 'A',
                    explanation: 'Teil 3 bewertet Interaktion und Kooperation.'
                }
            ];
        }

        function parseDtzQuestions(module, teil, payload) {
            const set = payload && payload.set ? payload.set : {};
            const item = Array.isArray(set.items) ? (set.items[0] || null) : null;
            if (!item) return [];

            if (module === 'hoeren') {
                const rawQuestions = Array.isArray(item.questions) ? item.questions : [];
                return rawQuestions.map((q, idx) => ({
                    id: q.id || `h${teil}_${idx + 1}`,
                    question_text: q.question || 'Frage',
                    options: q.options || {},
                    correct: q.correct || 'A',
                    explanation: q.explanation || '',
                    audio_script: q.audio_script || item.audio_script || ''
                }));
            }

            const schema = String(item.dtz_schema || '');
            if (schema === 'lesen_teil1_wegweiser') {
                const wegweiserText = Array.isArray(item.wegweiser) ? item.wegweiser.join('\n') : '';
                const situations = Array.isArray(item.situations) ? item.situations : [];
                return situations.map((s, idx) => ({
                    id: s.id || `l1_${idx + 1}`,
                    question_text: `${wegweiserText}\n\n${s.no}. ${s.prompt}`,
                    options: s.options || {},
                    correct: s.correct || 'A',
                    explanation: s.explanation || ''
                }));
            }

            if (schema === 'lesen_teil2_matching') {
                const ads = item.ads && typeof item.ads === 'object' ? item.ads : {};
                const labels = Array.isArray(item.labels) ? item.labels : Object.keys(ads);
                const adsText = Object.keys(ads).map((key) => `${key}) ${ads[key]}`).join('\n');
                const optionMap = {};
                labels.forEach((key) => {
                    optionMap[key] = key === 'X' ? 'X' : key;
                });
                const situations = Array.isArray(item.situations) ? item.situations : [];
                return situations.map((s, idx) => ({
                    id: s.id || `l2_${idx + 1}`,
                    question_text: `${adsText}\n\n${s.no}. ${s.prompt}\nAntworten Sie mit A-H oder X.`,
                    options: optionMap,
                    correct: s.correct || 'X',
                    explanation: s.explanation || ''
                }));
            }

            if (schema === 'lesen_teil3_textblock_mix') {
                const blocks = Array.isArray(item.blocks) ? item.blocks : [];
                const out = [];
                blocks.forEach((b, idx) => {
                    const baseText = `${b.title || `Text ${idx + 1}`}\n${b.text || ''}`;
                    if (b.true_false) {
                        out.push({
                            id: b.true_false.id || `l3_tf_${idx + 1}`,
                            question_text: `${baseText}\n\n${b.true_false.no}. ${b.true_false.statement}`,
                            options: { A: 'Richtig', B: 'Falsch' },
                            correct: b.true_false.correct || 'A',
                            explanation: b.true_false.explanation || ''
                        });
                    }
                    if (b.mc) {
                        out.push({
                            id: b.mc.id || `l3_mc_${idx + 1}`,
                            question_text: `${baseText}\n\n${b.mc.no}. ${b.mc.question}`,
                            options: b.mc.options || {},
                            correct: b.mc.correct || 'A',
                            explanation: b.mc.explanation || ''
                        });
                    }
                });
                return out;
            }

            if (schema === 'lesen_teil4_richtig_falsch_text') {
                const sourceText = String(item.text || '');
                const statements = Array.isArray(item.statements) ? item.statements : [];
                return statements.map((s, idx) => ({
                    id: s.id || `l4_${idx + 1}`,
                    question_text: `${sourceText}\n\n${s.no}. ${s.statement}`,
                    options: { A: 'Richtig', B: 'Falsch' },
                    correct: s.correct || 'A',
                    explanation: s.explanation || ''
                }));
            }

            if (schema === 'lesen_teil5_lueckentext') {
                const textTemplate = String(item.text_template || '');
                const out = [];
                if (item.example && item.example.options) {
                    out.push({
                        id: 'l5_example',
                        question_text: `${textTemplate}\n\n0. Beispiel`,
                        options: item.example.options,
                        correct: item.example.correct || 'A',
                        explanation: item.example.rationale || ''
                    });
                }
                const gaps = Array.isArray(item.gaps) ? item.gaps : [];
                gaps.forEach((g, idx) => {
                    out.push({
                        id: g.id || `l5_${idx + 1}`,
                        question_text: `${textTemplate}\n\n${g.no}. Lücke`,
                        options: g.options || {},
                        correct: g.correct || 'A',
                        explanation: g.rationale || ''
                    });
                });
                return out;
            }

            return [];
        }

        function normalizeOptionEntries(options) {
            if (Array.isArray(options)) {
                return options.map((value, idx) => ({
                    key: String.fromCharCode(65 + idx),
                    text: String(value || '')
                }));
            }
            if (options && typeof options === 'object') {
                return Object.keys(options).map((key) => ({
                    key: String(key),
                    text: String(options[key] || '')
                }));
            }
            return [];
        }

        function escapeHtml(text) {
            return String(text || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderQuestionText(questionTextRaw) {
            const el = document.getElementById('question-text');
            const text = String(questionTextRaw || '').trim();
            if (!text) {
                el.textContent = 'Frage lädt...';
                return;
            }

            const sections = text.split('\n\n').map((s) => s.trim()).filter(Boolean);
            if (sections.length < 2) {
                el.textContent = text;
                return;
            }

            const header = sections[0];
            const body = sections.slice(1).join('\n\n');
            const lines = header.split('\n').map((l) => l.trim()).filter(Boolean);
            const firstLine = lines[0] || '';
            const hasTextHeading = /^Text\s+\d+/i.test(firstLine);
            const hasAds = lines.some((line) => /^[A-H]\)/.test(line));
            const looksLikeWayfinder = lines.some((line) => /^(UG|EG|OG|\d+\.\s*Stock|\d+\.\s*Etage)\s*:/i.test(line));
            let sourceLabel = 'Information';
            if (hasTextHeading) sourceLabel = 'Lesetext';
            else if (looksLikeWayfinder) sourceLabel = 'Wegweiser';
            else if (hasAds) sourceLabel = 'Information';
            let linesHtml = '';

            if (hasTextHeading) {
                const textTitle = firstLine;
                const textBody = lines.slice(1).join('\n');
                linesHtml = `
                    <div class="question-source-title">${escapeHtml(textTitle)}</div>
                    <div class="question-source-body">${escapeHtml(textBody)}</div>
                `;
            } else if (looksLikeWayfinder) {
                const rows = lines.map((line) => {
                    const match = line.match(/^([^:]+):\s*(.+)$/);
                    if (!match) {
                        return `
                            <div class="source-wayfinder-row">
                                <div class="source-wayfinder-level">Bereich</div>
                                <div class="source-wayfinder-items">${escapeHtml(line)}</div>
                                <div class="source-wayfinder-arrow">&rarr;</div>
                            </div>
                        `;
                    }
                    return `
                        <div class="source-wayfinder-row">
                            <div class="source-wayfinder-level">${escapeHtml(match[1])}</div>
                            <div class="source-wayfinder-items">${escapeHtml(match[2])}</div>
                            <div class="source-wayfinder-arrow">&rarr;</div>
                        </div>
                    `;
                }).join('');
                linesHtml = `
                    <div class="source-wayfinder">
                        <div class="source-wayfinder-header">
                            <span class="source-wayfinder-header-title">Lageplan / Wegweiser</span>
                            <span class="source-wayfinder-header-sub">Bitte Bereich auswählen</span>
                        </div>
                        ${rows}
                    </div>
                `;
            } else if (hasAds) {
                const cards = lines.map((line) => {
                    const match = line.match(/^([A-H])\)\s*(.+)$/);
                    if (!match) return `<div class="source-info-card">${escapeHtml(line)}</div>`;
                    return `<div class="source-info-card"><span class="source-info-label">${match[1]})</span>${escapeHtml(match[2])}</div>`;
                }).join('');
                linesHtml = `<div class="source-info-list">${cards}</div>`;
            } else {
                linesHtml = lines.map((line) => `<div class="source-info-card">${escapeHtml(line)}</div>`).join('');
            }

            el.innerHTML = `
                <div class="question-rich">
                    <div class="question-panel">
                        <span class="question-panel-title">${escapeHtml(sourceLabel)}</span>
                        <div class="question-lines">${linesHtml}</div>
                    </div>
                    <div class="question-panel question-main">${escapeHtml(body)}</div>
                </div>
            `;
        }
        
        function generateMockQuestions() {
            // Generate sample questions based on module and teil
            const count = moduleInfo[currentModule].teile.find(t => t.num === currentTeil).questions;
            questions = [];
            
            for (let i = 0; i < count; i++) {
                questions.push({
                    id: i,
                    question_text: `Beispielfrage ${i + 1} für ${currentModule} Teil ${currentTeil}`,
                    options: ['Antwort A', 'Antwort B', 'Antwort C', 'Antwort D'],
                    correct: 'A',
                    explanation: 'Das ist die Erklärung zur richtigen Antwort.'
                });
            }
        }
        
        function showQuestion() {
            if (!questions.length) {
                document.getElementById('question-text').textContent = 'Bu bölüm için soru bulunamadı.';
                document.getElementById('answer-options').innerHTML = '';
                document.getElementById('audio-player').style.display = 'none';
                return;
            }
            if (currentQuestion >= questions.length) {
                showResults();
                return;
            }
            
            const q = questions[currentQuestion];
            answered = false;
            selectedAnswer = null;
            
            // Update question text
            const questionText = q.question_text || q.content?.question || q.content?.text || 'Frage lädt...';
            renderQuestionText(questionText);
            currentAudioText = String(q.audio_script || '');
            currentTtsSegments = [];
            const audioStatus = document.getElementById('audioStatus');
            if (audioStatus) {
                audioStatus.textContent = currentAudioText ? 'Klicken Sie zum Hören' : 'Kein Audio für diese Frage';
            }
            
            // Update options
            const optionsDiv = document.getElementById('answer-options');
            const optionEntries = normalizeOptionEntries(q.options || q.content?.options);
            optionsDiv.innerHTML = optionEntries.map((opt) => `
                <div class="answer-option" onclick="selectAnswer('${opt.key}', this)">
                    ${opt.key}) ${opt.text}
                </div>
            `).join('');
            
            // Show/hide audio player
            document.getElementById('audio-player').style.display = 
                currentModule === 'hoeren' ? 'flex' : 'none';
            
            // Hide feedback
            document.getElementById('feedback-box').classList.remove('show');
            
            updateStats();
        }
        
        function selectAnswer(answer, element) {
            if (answered) return;
            
            selectedAnswer = answer;
            
            // Update UI
            document.querySelectorAll('.answer-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }
        
        function checkAnswer() {
            if (!selectedAnswer || answered) return;
            
            answered = true;
            const q = questions[currentQuestion];
            const correct = String(q.correct || q.correct_answer?.answer || 'A');
            
            // Show correct/wrong
            document.querySelectorAll('.answer-option').forEach((el) => {
                const letter = String(el.textContent || '').split(')')[0].trim();
                if (letter === correct) {
                    el.classList.add('correct');
                } else if (letter === selectedAnswer && selectedAnswer !== correct) {
                    el.classList.add('wrong');
                }
            });
            
            // Show feedback
            const feedbackBox = document.getElementById('feedback-box');
            const feedbackText = document.getElementById('feedback-text');
            
            if (selectedAnswer === correct) {
                feedbackBox.className = 'feedback-box correct show';
                feedbackText.innerHTML = '<strong>✓ Richtig!</strong><br>' + (q.explanation || 'Gut gemacht!');
                correctCount++;
                streak++;
            } else {
                feedbackBox.className = 'feedback-box wrong show';
                feedbackText.innerHTML = '<strong>✗ Falsch</strong><br>Richtig wäre: ' + correct + '<br>' + (q.explanation || '');
                streak = 0;
            }
            
            updateStats();
        }
        
        function nextQuestion() {
            if (!answered) return;
            currentQuestion++;
            showQuestion();
        }
        
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }
        
        function updateStats() {
            document.getElementById('current-q').textContent = Math.min(currentQuestion + 1, questions.length);
            document.getElementById('total-q').textContent = questions.length;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('streak-count').textContent = streak;
        }
        
        function showResults() {
            const percentage = Math.round((correctCount / questions.length) * 100);
            
            document.getElementById('question-area').innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">${percentage >= 60 ? '🎉' : '💪'}</div>
                    <h2>Teil abgeschlossen!</h2>
                    <p style="font-size: 1.5rem; margin: 1.5rem 0;">
                        Du hast <strong>${correctCount}/${questions.length}</strong> richtig beantwortet
                    </p>
                    <p style="font-size: 2rem; color: var(--accent); font-weight: 700;">${percentage}%</p>
                    <p style="color: var(--text-muted); margin: 1rem 0;">
                        ${percentage >= 80 ? 'Sehr gut! Du bist bereit für die Prüfung.' : 
                          percentage >= 60 ? 'Gut gemacht! Noch etwas üben.' : 
                          'Übe weiter! Schau dir die Erklärungen an.'}
                    </p>
                    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                        <a href="learn.html?module=${currentModule}" class="btn-nav" style="text-decoration: none; display: inline-block;">
                            ← Anderen Teil wählen
                        </a>
                        <a href="learn.html" class="btn-check" style="text-decoration: none; display: inline-block;">
                            Anderes Modul
                        </a>
                    </div>
                </div>
            `;
        }
        
        function playAudio() {
            void playAudioAsync();
        }

        async function playAudioAsync() {
            const btn = document.getElementById('audioBtn');
            const statusEl = document.getElementById('audioStatus');
            const text = (currentAudioText || '').trim();
            if (!text) {
                if (statusEl) statusEl.textContent = 'Kein Audio für diese Frage';
                return;
            }

            if (currentAudioPlayer) {
                try { currentAudioPlayer.pause(); } catch (_) {}
                currentAudioPlayer = null;
            }

            currentPlaybackToken += 1;
            const token = currentPlaybackToken;
            if (btn) {
                btn.classList.add('playing');
                btn.textContent = '⏸';
            }
            if (statusEl) statusEl.textContent = 'Audio wird geladen...';

            try {
                if (!currentTtsSegments.length) {
                    const response = await fetch(`${API_BASE}/dtz_tts_public.php`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ script: text })
                    });
                    const payload = await response.json().catch(() => ({}));
                    if (!response.ok || !payload.ok) {
                        throw new Error(String(payload.error || `Fehler ${response.status}`));
                    }
                    currentTtsSegments = Array.isArray(payload.segments) ? payload.segments : [];
                }

                if (!currentTtsSegments.length) {
                    throw new Error('Keine Audio-Segmente erzeugt.');
                }
                if (statusEl) statusEl.textContent = 'Wiedergabe läuft...';

                for (const seg of currentTtsSegments) {
                    if (token !== currentPlaybackToken) return;
                    const url = String(seg && seg.url ? seg.url : '');
                    if (!url) continue;
                    const audio = new Audio(url);
                    currentAudioPlayer = audio;
                    await new Promise((resolve, reject) => {
                        audio.onended = resolve;
                        audio.onerror = () => reject(new Error('Audio konnte nicht abgespielt werden.'));
                        audio.play().catch(reject);
                    });
                    const pause = Math.max(0, Number(seg && seg.pause_ms ? seg.pause_ms : 0));
                    if (pause > 0) {
                        await new Promise((resolve) => setTimeout(resolve, pause));
                    }
                }
                if (statusEl) statusEl.textContent = 'Audio fertig';
            } catch (err) {
                if (statusEl) statusEl.textContent = 'Audio-Fehler';
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'de-DE';
                    speechSynthesis.cancel();
                    speechSynthesis.speak(utterance);
                }
            } finally {
                if (token === currentPlaybackToken && btn) {
                    btn.classList.remove('playing');
                    btn.textContent = '▶️';
                }
                currentAudioPlayer = null;
            }
        }
