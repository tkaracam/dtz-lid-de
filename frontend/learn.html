<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <!-- Security Headers -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <title>Lernen - DTZ Lernplattform</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/frontend/img/icon-192x192.png">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components-new.css
    <link rel="stylesheet" href="css/layout.css">">
    <style>
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
        }
        
        .sidebar-logo {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 0.5rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(124, 92, 255, 0.2);
            color: var(--accent);
        }
        
        .main-content {
            padding: 2rem;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 {
            font-size: 1.75rem;
        }
        
        .module-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .module-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .module-btn:hover, .module-btn.active {
            border-color: var(--accent);
            background: rgba(124, 92, 255, 0.1);
        }
        
        .module-btn .icon {
            font-size: 1.5rem;
        }
        
        .teil-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .teil-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .teil-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        
        .teil-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 25px 50px rgba(124, 92, 255, 0.2);
        }
        
        .teil-card:hover::before {
            transform: scaleX(1);
        }
        
        .teil-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .teil-number {
            background: var(--accent);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .teil-level {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .teil-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .teil-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .teil-progress {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            min-width: 50px;
            text-align: right;
        }
        
        .question-area {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        .question-area.active {
            display: block;
            animation: fadeInUp 0.5s ease forwards;
        }
        
        .audio-player {
            background: rgba(124, 92, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .audio-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .audio-btn:hover {
            transform: scale(1.1);
        }

        .audio-btn.playing {
            background: linear-gradient(135deg, #16a34a, #22c55e);
        }
        
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 0.55rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .question-media {
            display: none;
            margin-bottom: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass-bg);
            overflow: hidden;
        }

        .question-media.active {
            display: block;
        }

        .question-media img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .question-media-caption {
            padding: 0.55rem 0.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
        }

        .sprechteil-topic {
            margin-bottom: 0.9rem;
            padding: 0.7rem 0.8rem;
            border-radius: 10px;
            border: 1px solid rgba(34, 197, 94, 0.35);
            background: rgba(34, 197, 94, 0.1);
            color: #dcfce7;
            font-size: 0.95rem;
        }
        
        .question-rich {
            display: grid;
            gap: 0.9rem;
            margin-bottom: 0.1rem;
        }
        
        .question-panel {
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 0.95rem 1.05rem;
        }
        
        .question-panel-title {
            display: inline-block;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.55rem;
        }
        
        .question-lines {
            display: grid;
            gap: 0.4rem;
            font-size: 0.98rem;
            line-height: 1.42;
        }

        .source-wayfinder {
            display: grid;
            gap: 0.55rem;
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid rgba(96, 165, 250, 0.35);
            background:
                linear-gradient(180deg, rgba(30, 64, 175, 0.25), rgba(15, 23, 42, 0.22)),
                repeating-linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.03) 0,
                    rgba(255, 255, 255, 0.03) 8px,
                    rgba(255, 255, 255, 0.01) 8px,
                    rgba(255, 255, 255, 0.01) 16px
                );
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), 0 10px 28px rgba(2, 6, 23, 0.35);
        }

        .source-wayfinder-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.45rem 0.6rem;
            border-radius: 8px;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.35), rgba(37, 99, 235, 0.2));
            border: 1px solid rgba(147, 197, 253, 0.35);
            margin-bottom: 0.35rem;
        }

        .source-wayfinder-header-title {
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #dbeafe;
        }

        .source-wayfinder-header-sub {
            font-size: 0.75rem;
            color: #bfdbfe;
        }

        .source-wayfinder-row {
            display: grid;
            grid-template-columns: 92px 1fr 30px;
            gap: 0.55rem;
            align-items: center;
            padding: 0.45rem 0.55rem;
            border-radius: 8px;
            background: linear-gradient(90deg, rgba(15, 23, 42, 0.75), rgba(30, 41, 59, 0.72));
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        .source-wayfinder-level {
            font-weight: 700;
            color: #dbeafe;
            text-align: center;
            border-right: 1px solid rgba(148, 163, 184, 0.35);
            padding-right: 0.35rem;
        }

        .source-wayfinder-items {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #e2e8f0;
            overflow-wrap: anywhere;
        }

        .source-wayfinder-arrow {
            text-align: center;
            font-size: 1.05rem;
            color: #93c5fd;
            font-weight: 700;
        }

        @media (max-width: 640px) {
            .source-wayfinder {
                padding: 0.55rem;
            }

            .source-wayfinder-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.2rem;
            }

            .source-wayfinder-row {
                grid-template-columns: 72px 1fr;
                gap: 0.45rem;
                padding: 0.42rem 0.45rem;
            }

            .source-wayfinder-level {
                font-size: 0.86rem;
                padding-right: 0.25rem;
            }

            .source-wayfinder-items {
                font-size: 0.9rem;
            }

            .source-wayfinder-arrow {
                display: none;
            }
        }

        .source-info-list {
            display: grid;
            gap: 0.55rem;
        }

        .source-info-card {
            padding: 0.55rem 0.65rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.04);
        }

        .source-info-label {
            font-weight: 700;
            color: var(--accent);
            margin-right: 0.35rem;
        }

        .question-source-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.45rem;
        }

        .question-source-body {
            font-size: 0.98rem;
            line-height: 1.55;
            color: var(--text);
        }
        
        .question-main {
            font-size: 1.03rem;
            line-height: 1.5;
            font-weight: 600;
        }
        
        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .answer-option {
            padding: 1rem 1.25rem;
            border: 2px solid var(--glass-border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .answer-option:hover {
            border-color: var(--accent);
            background: rgba(124, 92, 255, 0.1);
        }
        
        .answer-option.selected {
            border-color: var(--accent);
            background: rgba(124, 92, 255, 0.2);
        }
        
        .answer-option.correct {
            border-color: #2ed573;
            background: rgba(46, 213, 115, 0.2);
        }
        
        .answer-option.wrong {
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.2);
        }
        
        .feedback-box {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: 10px;
            display: none;
        }
        
        .feedback-box.show {
            display: block;
        }
        
        .feedback-box.correct {
            background: rgba(46, 213, 115, 0.1);
            border-left: 4px solid #2ed573;
        }
        
        .feedback-box.wrong {
            background: rgba(255, 71, 87, 0.1);
            border-left: 4px solid #ff4757;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }
        
        .btn-nav {
            padding: 0.75rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-nav:hover {
            border-color: var(--accent);
        }
        
        .btn-check {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 92, 255, 0.3);
        }
        
        .stats-bar {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--glass-bg);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .stat-value {
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .teil-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Speaking Recorder Styles */
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px 10px rgba(255, 71, 87, 0.3); }
        }
        
        .speaking-recorder {
            transition: all 0.3s ease;
        }
        
        .speaking-recorder.recording {
            border-color: #ff4757 !important;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.2);
        }
        
        #recording-timer.recording {
            color: #ff4757;
            animation: timerPulse 1s infinite;
        }
        
        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .recorder-controls button:disabled {
            opacity: 0.4 !important;
            cursor: not-allowed;
        }
        
        #audio-visualizer {
            border-radius: 4px;
        }
        
        #analysis-result {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">DTZ Learning</div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="learn.html" class="nav-link active">📚 Lernen</a>
                    </li>
                    <li class="nav-item">
                        <a href="modelltest.html" class="nav-link">📝 Modelltest</a>
                    </li>
                    <li class="nav-item">
                        <a href="writing.html" class="nav-link">✍️ Schreiben</a>
                    </li>
                    <li class="nav-item">
                        <a href="progress.html" class="nav-link">📈 Fortschritt</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" onclick="logout()" class="nav-link">🚪 Abmelden</a>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="header">
                <h1>📚 Lernen</h1>
            </div>
            
            <div class="module-selector" id="module-selector">
                <button class="module-btn" data-module="hoeren" onclick="selectModule('hoeren')">
                    <span class="icon">🎧</span>
                    <span>Hören</span>
                </button>
                <button class="module-btn" data-module="lesen" onclick="selectModule('lesen')">
                    <span class="icon">📖</span>
                    <span>Lesen</span>
                </button>
                <button class="module-btn" data-module="sprechen" onclick="selectModule('sprechen')">
                    <span class="icon">🗣️</span>
                    <span>Sprechen</span>
                </button>
            </div>
            
            <div class="stats-bar" id="stats-bar" style="display: none;">
                <div class="stat-item">
                    <span class="stat-label">Frage:</span>
                    <span class="stat-value" id="current-q">1</span>
                    <span class="stat-label">/</span>
                    <span class="stat-value" id="total-q">10</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Richtig:</span>
                    <span class="stat-value" id="correct-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Serie:</span>
                    <span class="stat-value" id="streak-count">0</span>
                    <span>🔥</span>
                </div>
            </div>
            
            <div class="teil-grid" id="teil-grid">
                <!-- Teile will be loaded here -->
            </div>
            
            <div class="question-area" id="question-area">
                <div class="audio-player" id="audio-player" style="display: none;">
                    <button id="audioBtn" class="audio-btn" onclick="playAudio()">▶️</button>
                    <div>
                        <div style="font-weight: 600;">🎧 Audio abspielen</div>
                        <div id="audioStatus" style="font-size: 0.875rem; color: var(--text-muted);">Klicken Sie zum Hören</div>
                    </div>
                </div>

                <div id="questionMedia" class="question-media"></div>
                
                <div class="question-text" id="question-text"></div>
                
                <div class="answer-options" id="answer-options"></div>
                
                <div class="feedback-box" id="feedback-box">
                    <div id="feedback-text"></div>
                </div>
                
                <!-- AI Help Buttons -->
                <div id="ai-help-container" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border);"></div>
                
                <div class="nav-buttons">
                    <button class="btn-nav" onclick="previousQuestion()">← Zurück</button>
                    <button id="checkBtn" class="btn-check" onclick="checkAnswer()">Überprüfen</button>
                    <button class="btn-nav" onclick="nextQuestion()">Weiter →</button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/security.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ai-tutor.js"></script>
    <script>
        checkAuth();
        
        let currentModule = null;
        let currentTeil = null;
        let currentQuestion = 0;
        let questions = [];
        let selectedAnswer = null;
        let correctCount = 0;
        let streak = 0;
        let answered = false;
        let currentAudioText = '';
        let currentPlaybackToken = 0;
        let currentAudioPlayer = null;
        let currentTtsSegments = [];
        
        const moduleInfo = {
            hoeren: {
                name: 'Hören',
                icon: '🎧',
                teile: [
                    { num: 1, name: 'Telefonansagen', desc: 'Anrufbeantworter, Durchsagen', level: 'A2', questions: 5 },
                    { num: 2, name: 'Alltagsgespräche', desc: 'Gespräche im Alltag', level: 'A2', questions: 5 },
                    { num: 3, name: 'Interviews', desc: 'Berufs- und Arbeitsgespräche', level: 'B1', questions: 5 },
                    { num: 4, name: 'Information', desc: 'Rundfunk, Nachrichten', level: 'B1', questions: 5 }
                ]
            },
            lesen: {
                name: 'Lesen',
                icon: '📖',
                teile: [
                    { num: 1, name: 'Anzeigen', desc: 'Kleinanzeigen, Aushänge', level: 'A2', questions: 5 },
                    { num: 2, name: 'Alltagstexte', desc: 'Briefe, E-Mails, Hinweise', level: 'A2', questions: 5 },
                    { num: 3, name: 'Arbeitswelttexte', desc: 'Stellenanzeigen, Verträge', level: 'B1', questions: 5 },
                    { num: 4, name: 'Komplexe Texte', desc: 'Zeitungsartikel, Informationen', level: 'B1', questions: 5 },
                    { num: 5, name: 'Mehrere Texte', desc: 'Vergleichen, Zuordnen', level: 'B1', questions: 5 }
                ]
            },
            sprechen: {
                name: 'Sprechen',
                icon: '🗣️',
                teile: [

                ]
            }
        };
        
        // Check URL params for module
        const urlParams = new URLSearchParams(window.location.search);
        const moduleParam = urlParams.get('module');
        if (moduleParam && moduleInfo[moduleParam]) {
            selectModule(moduleParam);
        }
        
        function selectModule(module) {
            currentModule = module;
            currentTeil = null;
            currentQuestion = 0;
            
            // Update UI
            document.querySelectorAll('.module-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.module === module) {

                }
            });

                        </div>

        async function selectTeil(teilNum) {
            currentTeil = teilNum;
            currentQuestion = 0;
            correctCount = 0;
            streak = 0;
            
            // Load questions from API
            await loadQuestions();
            
            // Show question area
            document.getElementById('teil-grid').innerHTML = '';
            document.getElementById('question-area').classList.add('active');
            document.getElementById('stats-bar').style.display = 'flex';
            
            updateStats();
            showQuestion();
        }
        
        async function loadQuestions() {
            try {
                if (currentModule === 'sprechen') {
                    questions = buildSprechenTasks(currentTeil);
                    return;
                }
                if (currentModule !== 'hoeren' && currentModule !== 'lesen') {
                    questions = [];
                    return;
                }
                const response = await fetch(`${API_BASE}/dtz_${currentModule}_teil${currentTeil}_public.php`);
                const data = await response.json().catch(() => ({}));
                const parsed = parseDtzQuestions(currentModule, currentTeil, data);
                if (!parsed.length) {
                    throw new Error('Keine DTZ-Fragen gefunden.');
                }
                questions = parsed;
            } catch (err) {
                console.error('Failed to load questions:', err);
                questions = [];
                document.getElementById('question-text').textContent = 'Fragen konnten nicht geladen werden.';
                document.getElementById('answer-options').innerHTML = '';
            }
        }

        function parseDtzQuestions(module, teil, payload) {
            const set = payload && payload.set ? payload.set : {};
            const item = Array.isArray(set.items) ? (set.items[0] || null) : null;
            if (!item) return [];

            if (module === 'hoeren') {
                const rawQuestions = Array.isArray(item.questions) ? item.questions : [];
                return rawQuestions.map((q, idx) => ({
                    id: q.id || `h${teil}_${idx + 1}`,
                    question_text: q.question || 'Frage',
                    options: q.options || {},
                    correct: q.correct || 'A',
                    explanation: q.explanation || '',
                    audio_script: q.audio_script || item.audio_script || ''
                }));
            }

            const schema = String(item.dtz_schema || '');
            if (schema === 'lesen_teil1_wegweiser') {
                const wegweiserText = Array.isArray(item.wegweiser) ? item.wegweiser.join('\n') : '';
                const situations = Array.isArray(item.situations) ? item.situations : [];
                return situations.map((s, idx) => ({
                    id: s.id || `l1_${idx + 1}`,
                    question_text: `${wegweiserText}\n\n${s.no}. ${s.prompt}`,
                    options: s.options || {},
                    correct: s.correct || 'A',
                    explanation: s.explanation || ''
                }));
            }

            if (schema === 'lesen_teil2_matching') {
                const ads = item.ads && typeof item.ads === 'object' ? item.ads : {};
                const labels = Array.isArray(item.labels) ? item.labels : Object.keys(ads);
                const adsText = Object.keys(ads).map((key) => `${key}) ${ads[key]}`).join('\n');
                const optionMap = {};
                labels.forEach((key) => {
                    optionMap[key] = key === 'X' ? 'X' : key;
                });
                const situations = Array.isArray(item.situations) ? item.situations : [];
                return situations.map((s, idx) => ({
                    id: s.id || `l2_${idx + 1}`,
                    question_text: `${adsText}\n\n${s.no}. ${s.prompt}\nAntworten Sie mit A-H oder X.`,
                    options: optionMap,
                    correct: s.correct || 'X',
                    explanation: s.explanation || ''
                }));
            }

            if (schema === 'lesen_teil3_textblock_mix') {
                const blocks = Array.isArray(item.blocks) ? item.blocks : [];
                const out = [];
                blocks.forEach((b, idx) => {
                    const baseText = `${b.title || `Text ${idx + 1}`}\n${b.text || ''}`;
                    if (b.true_false) {
                        out.push({
                            id: b.true_false.id || `l3_tf_${idx + 1}`,
                            question_text: `${baseText}\n\n${b.true_false.no}. ${b.true_false.statement}`,
                            options: { A: 'Richtig', B: 'Falsch' },
                            correct: b.true_false.correct || 'A',
                            explanation: b.true_false.explanation || ''
                        });
                    }
                    if (b.mc) {
                        out.push({
                            id: b.mc.id || `l3_mc_${idx + 1}`,
                            question_text: `${baseText}\n\n${b.mc.no}. ${b.mc.question}`,
                            options: b.mc.options || {},
                            correct: b.mc.correct || 'A',
                            explanation: b.mc.explanation || ''
                        });
                    }
                });
                return out;
            }

            if (schema === 'lesen_teil4_richtig_falsch_text') {
                const sourceText = String(item.text || '');
                const statements = Array.isArray(item.statements) ? item.statements : [];
                return statements.map((s, idx) => ({
                    id: s.id || `l4_${idx + 1}`,
                    question_text: `${sourceText}\n\n${s.no}. ${s.statement}`,
                    options: { A: 'Richtig', B: 'Falsch' },
                    correct: s.correct || 'A',
                    explanation: s.explanation || ''
                }));
            }

            if (schema === 'lesen_teil5_lueckentext') {
                const textTemplate = String(item.text_template || '');
                const out = [];
                if (item.example && item.example.options) {
                    const exampleText = textTemplate.replace('[0]', '_____');
                    out.push({
                        id: 'l5_example',
                        question_text: `${exampleText}\n\nAufgabe 0 (Beispiel): Welche Option passt in die Lücke [0]?`,
                        options: item.example.options,
                        correct: item.example.correct || 'A',
                        explanation: item.example.rationale || ''
                    });
                }
                const gaps = Array.isArray(item.gaps) ? item.gaps : [];
                gaps.forEach((g, idx) => {
                    const marker = `[${g.no}]`;
                    const clozeText = textTemplate.replace(marker, '_____');
                    out.push({
                        id: g.id || `l5_${idx + 1}`,
                        question_text: `${clozeText}\n\nAufgabe ${g.no}: Welche Option passt in die Lücke [${g.no}]?`,
                        options: g.options || {},
                        correct: g.correct || 'A',
                        explanation: g.rationale || ''
                    });
                });
                return out;
            }

            return [];
        }

        function normalizeOptionEntries(options) {
            if (Array.isArray(options)) {
                return options.map((value, idx) => ({
                    key: String.fromCharCode(65 + idx),
                    text: String(value || '')
                }));
            }
            if (options && typeof options === 'object') {
                return Object.keys(options).map((key) => ({
                    key: String(key),
                    text: String(options[key] || '')
                }));
            }
            return [];
        }

        function escapeHtml(text) {
            return String(text || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderQuestionText(questionTextRaw) {
            const el = document.getElementById('question-text');
            const text = String(questionTextRaw || '').trim();
            if (!text) {
                el.textContent = 'Frage lädt...';
                return;
            }

            const sections = text.split('\n\n').map((s) => s.trim()).filter(Boolean);
            if (sections.length < 2) {
                el.textContent = text;
                return;
            }

            let header = sections[0];
            let body = sections.slice(1).join('\n\n');
            let topicHtml = '';
            const hasTopicHeader = /^Thema:/i.test(header);
            if (hasTopicHeader) {
                topicHtml = `<div class="sprechteil-topic">${escapeHtml(header)}</div>`;
                header = sections[1] || '';
                body = sections.slice(2).join('\n\n') || body;
            }
            if (hasTopicHeader && sections.length <= 2) {
                el.innerHTML = `
                    <div class="question-rich">
                        ${topicHtml}
                        <div class="question-panel question-main">${escapeHtml(header || body)}</div>
                    </div>
                `;
                return;
            }
            const lines = header.split('\n').map((l) => l.trim()).filter(Boolean);
            const firstLine = lines[0] || '';
            const hasTextHeading = /^Text\s+\d+/i.test(firstLine);
            const hasAds = lines.some((line) => /^[A-H]\)/.test(line));
            const looksLikeWayfinder = lines.some((line) => /^(UG|EG|OG|\d+\.\s*Stock|\d+\.\s*Etage)\s*:/i.test(line));
            let sourceLabel = 'Information';
            if (hasTextHeading) sourceLabel = 'Lesetext';
            else if (looksLikeWayfinder) sourceLabel = 'Wegweiser';
            else if (hasAds) sourceLabel = 'Information';
            let linesHtml = '';

            if (hasTextHeading) {
                const textTitle = firstLine;
                const textBody = lines.slice(1).join('\n');
                linesHtml = `
                    <div class="question-source-title">${escapeHtml(textTitle)}</div>
                    <div class="question-source-body">${escapeHtml(textBody)}</div>
                `;
            } else if (looksLikeWayfinder) {
                const rows = lines.map((line) => {
                    const match = line.match(/^([^:]+):\s*(.+)$/);
                    if (!match) {
                        return `
                            <div class="source-wayfinder-row">
                                <div class="source-wayfinder-level">Bereich</div>
                                <div class="source-wayfinder-items">${escapeHtml(line)}</div>
                                <div class="source-wayfinder-arrow">&rarr;</div>
                            </div>
                        `;
                    }
                    return `
                        <div class="source-wayfinder-row">
                            <div class="source-wayfinder-level">${escapeHtml(match[1])}</div>
                            <div class="source-wayfinder-items">${escapeHtml(match[2])}</div>
                            <div class="source-wayfinder-arrow">&rarr;</div>
                        </div>
                    `;
                }).join('');
                linesHtml = `
                    <div class="source-wayfinder">
                        <div class="source-wayfinder-header">
                            <span class="source-wayfinder-header-title">Lageplan / Wegweiser</span>
                            <span class="source-wayfinder-header-sub">Bitte Bereich auswählen</span>
                        </div>
                        ${rows}
                    </div>
                `;
            } else if (hasAds) {
                const cards = lines.map((line) => {
                    const match = line.match(/^([A-H])\)\s*(.+)$/);
                    if (!match) return `<div class="source-info-card">${escapeHtml(line)}</div>`;
                    return `<div class="source-info-card"><span class="source-info-label">${match[1]})</span>${escapeHtml(match[2])}</div>`;
                }).join('');
                linesHtml = `<div class="source-info-list">${cards}</div>`;
            } else {
                linesHtml = lines.map((line) => `<div class="source-info-card">${escapeHtml(line)}</div>`).join('');
            }

            el.innerHTML = `
                <div class="question-rich">
                    ${topicHtml}
                    <div class="question-panel">
                        <span class="question-panel-title">${escapeHtml(sourceLabel)}</span>
                        <div class="question-lines">${linesHtml}</div>
                    </div>
                    <div class="question-panel question-main">${escapeHtml(body)}</div>
                </div>
            `;
        }

        function checkAnswer() {
            if (answered) return;
            
            answered = true;
            const q = questions[currentQuestion];
            if (q.mode === 'speaking') {
                // For speaking tasks, skip is allowed but encourage recording
                const feedbackBox = document.getElementById('feedback-box');
                const feedbackText = document.getElementById('feedback-text');
                
                if (currentRecordingBlob) {
                    feedbackBox.className = 'feedback-box correct show';
                    feedbackText.innerHTML = '<strong>✓ Aufnahme gespeichert</strong><br>Ihre Aufnahme wurde gespeichert. Die KI-Analyse erscheint in Kürze.';
                    correctCount++;
                    streak++;
                } else {
                    feedbackBox.className = 'feedback-box show';
                    feedbackBox.style.background = 'rgba(255, 193, 7, 0.15)';
                    feedbackBox.style.borderLeftColor = '#ffc107';
                    feedbackText.innerHTML = '<strong>⚠ Aufgabe übersprungen</strong><br>Für das beste Ergebnis empfehlen wir, jede Sprechaufgabe aufzunehmen und analysieren zu lassen.';
                }
                updateStats();
                return;
            }

            if (!selectedAnswer) return;
            const correct = String(q.correct || q.correct_answer?.answer || 'A');
            
            // Show correct/wrong
            document.querySelectorAll('.answer-option').forEach((el) => {
                const letter = String(el.textContent || '').split(')')[0].trim();
                if (letter === correct) {
                    el.classList.add('correct');
                } else if (letter === selectedAnswer && selectedAnswer !== correct) {
                    el.classList.add('wrong');
                }
            });
            
            // Show feedback
            const feedbackBox = document.getElementById('feedback-box');
            const feedbackText = document.getElementById('feedback-text');
            
            if (selectedAnswer === correct) {
                feedbackBox.className = 'feedback-box correct show';
                feedbackText.innerHTML = '<strong>✓ Richtig!</strong><br>' + (q.explanation || 'Gut gemacht!');
                correctCount++;
                streak++;
            } else {
                feedbackBox.className = 'feedback-box wrong show';
                feedbackText.innerHTML = '<strong>✗ Falsch</strong><br>Richtig wäre: ' + correct + '<br>' + (q.explanation || '');
                streak = 0;
                
                // Add AI analysis button for wrong answers
                const aiContainer = document.getElementById('ai-help-container');
                if (aiContainer && typeof AITutor !== 'undefined') {
                    aiContainer.innerHTML = '';
                    const helpBtn = AITutor.createHelpButton({
                        question: q.question_text || '',
                        showAnalysis: true,
                        userAnswer: selectedAnswer,
                        correctAnswer: correct
                    });
                    aiContainer.appendChild(helpBtn);
                }
            }
            
            updateStats();
        }
        
        function nextQuestion() {
            if (!answered) return;
            currentQuestion++;
            showQuestion();
        }
        
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }
        
        function updateStats() {
            document.getElementById('current-q').textContent = Math.min(currentQuestion + 1, questions.length);
            document.getElementById('total-q').textContent = questions.length;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('streak-count').textContent = streak;
        }
        
        function showResults() {

            document.getElementById('question-area').innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">${percentage >= 60 ? '🎉' : '💪'}</div>
                    <h2>Teil abgeschlossen!</h2>
                    <p style="font-size: 1.5rem; margin: 1.5rem 0;">
                        Du hast <strong>${correctCount}/${questions.length}</strong> richtig beantwortet
                    </p>
                    <p style="font-size: 2rem; color: var(--accent); font-weight: 700;">${percentage}%</p>
                    <p style="color: var(--text-muted); margin: 1rem 0;">
                        ${percentage >= 80 ? 'Sehr gut! Du bist bereit für die Prüfung.' : 
                          percentage >= 60 ? 'Gut gemacht! Noch etwas üben.' : 
                          'Übe weiter! Schau dir die Erklärungen an.'}
                    </p>
                    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">

                            ← Anderen Teil wählen
                        </a>

                            Anderes Modul
                        </a>
                    </div>
                </div>

        function playAudio() {
            void playAudioAsync();
        }

        async function playAudioAsync() {
            const btn = document.getElementById('audioBtn');
            const statusEl = document.getElementById('audioStatus');
            const text = (currentAudioText || '').trim();
            if (!text) {
                if (statusEl) statusEl.textContent = 'Kein Audio für diese Frage';
                return;
            }

            if (currentAudioPlayer) {
                try { currentAudioPlayer.pause(); } catch (_) {}
                currentAudioPlayer = null;
            }

            currentPlaybackToken += 1;
            const token = currentPlaybackToken;
            if (btn) {
                btn.classList.add('playing');
                btn.textContent = '⏸';
            }
            if (statusEl) statusEl.textContent = 'Audio wird geladen...';

            try {
                if (!currentTtsSegments.length) {
                    const response = await fetch(`${API_BASE}/dtz_tts_public.php`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ script: text })
                    });
                    const payload = await response.json().catch(() => ({}));
                    if (!response.ok || !payload.ok) {
                        throw new Error(String(payload.error || `Fehler ${response.status}`));
                    }
                    currentTtsSegments = Array.isArray(payload.segments) ? payload.segments : [];
                }

                if (!currentTtsSegments.length) {
                    throw new Error('Keine Audio-Segmente erzeugt.');
                }
                if (statusEl) statusEl.textContent = 'Wiedergabe läuft...';

                for (const seg of currentTtsSegments) {
                    if (token !== currentPlaybackToken) return;
                    const rawUrl = String(seg && seg.url ? seg.url : '');
                    if (!rawUrl) continue;
                    let url = rawUrl;
                    if (rawUrl.startsWith('./api/')) {
                        url = `${API_BASE}/${rawUrl.replace(/^\.\/api\//, '')}`;
                    } else if (rawUrl.startsWith('/api/')) {
                        url = rawUrl;
                    } else if (!/^https?:\/\//i.test(rawUrl)) {
                        url = `${API_BASE}/${rawUrl.replace(/^\/+/, '')}`;
                    }
                    const audio = new Audio(url);
                    currentAudioPlayer = audio;
                    await new Promise((resolve, reject) => {
                        audio.onended = resolve;
                        audio.onerror = () => reject(new Error('Audio konnte nicht abgespielt werden.'));
                        audio.play().catch(reject);
                    });
                    const pause = Math.max(0, Number(seg && seg.pause_ms ? seg.pause_ms : 0));
                    if (pause > 0) {
                        await new Promise((resolve) => setTimeout(resolve, pause));
                    }
                }
                if (statusEl) statusEl.textContent = 'Audio fertig';
            } catch (err) {
                if ('speechSynthesis' in window) {
                    if (statusEl) statusEl.textContent = 'Browser-Stimme aktiv';
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'de-DE';
                    speechSynthesis.cancel();
                    speechSynthesis.speak(utterance);
                } else if (statusEl) {
                    statusEl.textContent = 'Audio-Fehler';
                }
            } finally {
                if (token === currentPlaybackToken && btn) {
                    btn.classList.remove('playing');
                    btn.textContent = '▶️';
                }
                currentAudioPlayer = null;
            }
        }
        
        // ===== SPEAKING RECORDER FUNCTIONS =====
        
        let mediaRecorder = null;
        let audioChunks = [];
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let animationId = null;
        let recordingStartTime = null;
        let recordingTimerInterval = null;
        let currentRecordingBlob = null;
        let audioStream = null;
        
        // Speaking recorder state
        const speakingState = {
            isRecording: false,
            hasRecording: false,
            isPlaying: false,
            audioUrl: null,
            submissionId: null
        };
        
        function initSpeakingRecorder() {
            // Reset state
            speakingState.isRecording = false;
            speakingState.hasRecording = false;
            speakingState.isPlaying = false;
            currentRecordingBlob = null;
            
            // Clear visualizer
            const canvas = document.getElementById('audio-visualizer');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        async function toggleRecording() {
            if (speakingState.isRecording) {
                await stopRecording();
            } else {
                await startRecording();
            }
        }
        
        async function startRecording() {
            try {
                // Request microphone access
                audioStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 44100
                    } 
                });
                
                // Setup audio context for visualization
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(audioStream);
                source.connect(analyser);
                analyser.fftSize = 256;
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                // Setup media recorder
                const mimeType = getSupportedMimeType();
                mediaRecorder = new MediaRecorder(audioStream, { mimeType });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: mimeType });
                    currentRecordingBlob = blob;
                    speakingState.hasRecording = true;
                    speakingState.audioUrl = URL.createObjectURL(blob);
                    
                    // Enable play button
                    const playBtn = document.getElementById('play-btn');
                    if (playBtn) {
                        playBtn.disabled = false;
                        playBtn.style.opacity = '1';
                    }
                    
                    // Auto-upload after recording
                    await uploadRecording(blob);
                };
                
                // Start recording
                mediaRecorder.start(100); // Collect data every 100ms
                speakingState.isRecording = true;
                recordingStartTime = Date.now();
                
                // Update UI
                updateRecordingUI(true);
                
                // Start timer
                startRecordingTimer();
                
                // Start visualization
                visualizeAudio();
                
            } catch (err) {
                console.error('Recording error:', err);
                alert('Mikrofon-Zugriff fehlgeschlagen: ' + err.message);
            }
        }
        
        function getSupportedMimeType() {
            const types = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/mp4',
                'audio/ogg;codecs=opus',
                'audio/ogg',
                'audio/wav'
            ];
            
            for (const type of types) {
                if (MediaRecorder.isTypeSupported(type)) {
                    return type;
                }
            }
            
            return 'audio/webm';
        }
        
        async function stopRecording() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
            
            // Stop recorder
            mediaRecorder.stop();
            speakingState.isRecording = false;
            
            // Stop timer
            if (recordingTimerInterval) {
                clearInterval(recordingTimerInterval);
                recordingTimerInterval = null;
            }
            
            // Stop visualization
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            // Stop audio context
            if (audioContext) {
                await audioContext.close();
                audioContext = null;
            }
            
            // Stop all tracks
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
            }
            
            // Update UI
            updateRecordingUI(false);
        }
        
        function startRecordingTimer() {
            const timerEl = document.getElementById('recording-timer');
            const statusEl = document.getElementById('recording-status');
            
            recordingTimerInterval = setInterval(() => {
                if (!recordingStartTime) return;
                
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                
                if (timerEl) {
                    timerEl.textContent = `${minutes}:${seconds}`;
                    
                    // Color warning for long recordings
                    const q = questions[currentQuestion];
                    const targetDuration = q?.target_duration || 60;
                    if (elapsed > targetDuration + 30) {
                        timerEl.style.color = '#ff4757';
                    } else if (elapsed >= targetDuration) {
                        timerEl.style.color = '#2ed573';
                    }
                }
                
                if (statusEl) {
                    statusEl.textContent = 'Nehme auf... (Klicken zum Beenden)';
                }
            }, 100);
        }
        
        function updateRecordingUI(isRecording) {
            const recordBtn = document.getElementById('record-btn');
            const recordIcon = document.getElementById('record-icon');
            const recordText = document.getElementById('record-text');
            const statusEl = document.getElementById('recording-status');
            
            if (isRecording) {
                if (recordBtn) {
                    recordBtn.style.background = 'linear-gradient(135deg, #ff4757 0%, #ff6b81 100%)';
                    recordBtn.style.animation = 'pulse 1.5s infinite';
                }
                if (recordIcon) recordIcon.textContent = '⏹️';
                if (recordText) recordText.textContent = 'Stoppen';
                if (statusEl) statusEl.textContent = 'Nehme auf...';
            } else {
                if (recordBtn) {
                    recordBtn.style.background = '';
                    recordBtn.style.animation = '';
                }
                if (recordIcon) recordIcon.textContent = '🔴';
                if (recordText) recordText.textContent = 'Neu aufnehmen';
                if (statusEl) statusEl.textContent = speakingState.hasRecording ? 'Aufnahme bereit' : 'Bereit zum Aufnehmen';
            }
        }
        
        function visualizeAudio() {
            const canvas = document.getElementById('audio-visualizer');
            if (!canvas || !analyser) return;
            
            const ctx = canvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            
            function draw() {
                if (!speakingState.isRecording) return;
                
                animationId = requestAnimationFrame(draw);
                
                analyser.getByteFrequencyData(dataArray);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * canvas.height * 0.8;
                    
                    const gradient = ctx.createLinearGradient(0, canvas.height - barHeight, 0, canvas.height);
                    gradient.addColorStop(0, '#6366f1');
                    gradient.addColorStop(1, '#8b5cf6');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
            }
            
            draw();
        }
        
        async function uploadRecording(blob) {
            const progressDiv = document.getElementById('upload-progress');
            const progressBar = document.getElementById('upload-bar');
            const progressText = document.getElementById('upload-text');
            
            if (!progressDiv || !blob) return;
            
            progressDiv.style.display = 'block';
            progressBar.style.width = '20%';
            progressText.textContent = 'Wird hochgeladen...';
            
            try {
                const q = questions[currentQuestion];
                const formData = new FormData();
                formData.append('audio', blob, 'recording.webm');
                formData.append('task_id', q.id || 'unknown');
                formData.append('teil', currentTeil);
                formData.append('duration', Math.floor((Date.now() - recordingStartTime) / 1000));
                
                progressBar.style.width = '50%';
                
                // Get auth token
                const token = localStorage.getItem('access_token') || '';
                
                const response = await fetch('/api/sprechen/upload.php', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                progressBar.style.width = '80%';
                
                const result = await response.json();
                
                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Upload fehlgeschlagen');
                }
                
                speakingState.submissionId = result.submission_id;
                progressBar.style.width = '100%';
                progressText.textContent = 'Hochgeladen! Analyse wird gestartet...';
                
                // Start transcription and analysis
                setTimeout(() => {
                    startAnalysis(result.submission_id);
                }, 1000);
                
            } catch (err) {
                console.error('Upload error:', err);
                progressText.textContent = 'Fehler: ' + err.message;
                progressBar.style.background = '#ff4757';
            }
        }
        
        async function startAnalysis(submissionId) {
            const progressText = document.getElementById('upload-text');
            const token = localStorage.getItem('access_token') || '';
            
            try {
                // Step 1: Transcription
                if (progressText) progressText.textContent = 'Transkribiere...';
                
                const transcribeRes = await fetch('/api/sprechen/transcribe.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ submission_id: submissionId })
                });
                
                const transcribeData = await transcribeRes.json();
                
                if (!transcribeRes.ok) {
                    throw new Error(transcribeData.error || 'Transkription fehlgeschlagen');
                }
                
                // Step 2: Analysis
                if (progressText) progressText.textContent = 'KI analysiert...';
                
                const analyzeRes = await fetch('/api/sprechen/analyze.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ submission_id: submissionId })
                });
                
                const analyzeData = await analyzeRes.json();
                
                if (!analyzeRes.ok) {
                    throw new Error(analyzeData.error || 'Analyse fehlgeschlagen');
                }
                
                // Show results
                displayAnalysis(analyzeData.analysis, transcribeData.transcription);
                
            } catch (err) {
                console.error('Analysis error:', err);
                if (progressText) {
                    progressText.textContent = 'Analyse-Fehler: ' + err.message;
                }
            }
        }
        
        function displayAnalysis(analysis, transcription) {
            const resultDiv = document.getElementById('analysis-result');
            const contentDiv = document.getElementById('analysis-content');
            
            if (!resultDiv || !contentDiv || !analysis) return;
            
            const score = analysis.overall_score || 0;
            const level = analysis.dtz_level || 'A2';
            
            let scoreColor = '#ff4757';
            if (score >= 80) scoreColor = '#2ed573';
            else if (score >= 60) scoreColor = '#ffa502';
            
            contentDiv.innerHTML = `
                <div style="display: grid; gap: 1rem;">
                    <!-- Overall Score -->
                    <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; text-align: center;">
                        <div style="font-size: 3rem; font-weight: 700; color: ${scoreColor};">${score}/100</div>
                        <div style="font-size: 1.2rem; color: var(--accent);">DTZ-Niveau: ${level}</div>
                    </div>
                    
                    <!-- Transcription -->
                    <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
                        <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--primary);">📝 Transkription</div>
                        <div style="font-size: 0.95rem; line-height: 1.5; color: var(--text);">${escapeHtml(transcription || '')}</div>
                    </div>
                    
                    <!-- Detailed Scores -->
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem;">
                        ${renderScoreBar('Flüssigkeit', analysis.fluency)}
                        ${renderScoreBar('Grammatik', analysis.grammar)}
                        ${renderScoreBar('Wortschatz', analysis.vocabulary)}
                        ${renderScoreBar('Aufgabe', analysis.task_completion)}
                    </div>
                    
                    <!-- Strengths -->
                    ${analysis.strengths?.length ? `
                        <div style="background: rgba(46, 213, 115, 0.1); padding: 1rem; border-radius: 8px; border-left: 3px solid #2ed573;">
                            <div style="font-weight: 600; margin-bottom: 0.5rem; color: #2ed573;">✓ Stärken</div>
                            <ul style="margin: 0; padding-left: 1.2rem; font-size: 0.9rem;">
                                ${analysis.strengths.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                    
                    <!-- Improvements -->
                    ${analysis.improvements?.length ? `
                        <div style="background: rgba(255, 71, 87, 0.1); padding: 1rem; border-radius: 8px; border-left: 3px solid #ff4757;">
                            <div style="font-weight: 600; margin-bottom: 0.5rem; color: #ff4757;">→ Verbesserungen</div>
                            <ul style="margin: 0; padding-left: 1.2rem; font-size: 0.9rem;">
                                ${analysis.improvements.map(i => `<li>${escapeHtml(i)}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                    
                    <!-- Suggestions -->
                    ${analysis.suggestions?.length ? `
                        <div style="background: rgba(99, 102, 241, 0.1); padding: 1rem; border-radius: 8px; border-left: 3px solid var(--primary);">
                            <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--primary);">💡 Übungsvorschläge</div>
                            <ul style="margin: 0; padding-left: 1.2rem; font-size: 0.9rem;">
                                ${analysis.suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>
            `;
            
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function renderScoreBar(label, data) {
            if (!data) return '';
            const score = data.score || 0;
            let color = '#ff4757';
            if (score >= 80) color = '#2ed573';
            else if (score >= 60) color = '#ffa502';
            
            return `
                <div style="background: rgba(255,255,255,0.05); padding: 0.75rem; border-radius: 6px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.3rem;">
                        <span>${label}</span>
                        <span style="color: ${color}; font-weight: 600;">${score}%</span>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; overflow: hidden;">
                        <div style="background: ${color}; height: 100%; width: ${score}%; border-radius: 3px;"></div>
                    </div>
                </div>
            `;
        }
        
        function playRecording() {
            if (!speakingState.audioUrl) return;
            
            const playBtn = document.getElementById('play-btn');
            
            if (speakingState.isPlaying) {
                // Stop playing
                const audio = document.getElementById('playback-audio');
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                }
                speakingState.isPlaying = false;
                if (playBtn) {
                    playBtn.innerHTML = '▶️ Abspielen';
                }
            } else {
                // Start playing
                let audio = document.getElementById('playback-audio');
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = 'playback-audio';
                    document.body.appendChild(audio);
                }
                
                audio.src = speakingState.audioUrl;
                audio.onended = () => {
                    speakingState.isPlaying = false;
                    if (playBtn) playBtn.innerHTML = '▶️ Abspielen';
                };
                
                audio.play();
                speakingState.isPlaying = true;
                if (playBtn) {
                    playBtn.innerHTML = '⏹️ Stoppen';
                }
            }
        }
