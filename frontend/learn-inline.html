<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTZ Lernen - Inline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
        .selector { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        select, button {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            flex: 1;
            min-width: 120px;
        }
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .question-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .module-title {
            color: #6366f1;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .question-number {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .reading-text {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-line;
        }
        .option {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .option:hover {
            background: rgba(255,255,255,0.1);
            border-color: #6366f1;
        }
        .option.correct {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }
        .option.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .feedback.show { display: block; }
        .feedback.correct { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .feedback.wrong { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .audio-btn {
            background: #f59e0b;
            color: black;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 DTZ Lernen</h1>
        
        <div class="selector">
            <select id="moduleSelect">
                <option value="lesen">📖 Lesen</option>
                <option value="hoeren">🎧 Hören</option>
                <option value="schreiben">✍️ Schreiben</option>
            </select>
            <select id="teilSelect">
                <option value="1">Teil 1</option>
                <option value="2">Teil 2</option>
            </select>
            <button onclick="loadQuestions()">Soruları Göster</button>
        </div>
        
        <div id="content">
            <div style="text-align: center; padding: 40px; color: #94a3b8;">
                Modül ve Teil seçip "Soruları Göster" butonuna tıklayın
            </div>
        </div>
    </div>

    <script>
        // HARDCODED QUESTIONS - NO API NEEDED
        const QUESTIONS = {
            lesen: {
                1: [
                    {
                        id: 1,
                        question: "Sie sehen eine Anzeige. Was sucht die Familie Müller?",
                        text: "WOHNUNG GESUCHT\n\nFamilie Müller sucht ab 01.06. eine 3- bis 4-Zimmer-Wohnung in Köln-Ehrenfeld. Die Wohnung sollte mindestens 80 m² groß sein und einen Balkon haben. Wichtig: Die Wohnung muss barrierefrei sein.\n\nTel.: 0176-12345678 (ab 18 Uhr)",
                        options: ["A) Eine 2-Zimmer-Wohnung", "B) Eine barrierefreie 3-4 Zimmer-Wohnung mit Balkon", "C) Ein Haus mit Garten", "D) Eine möblierte Wohnung"],
                        correct: "B",
                        explanation: "Anzeige: '3- bis 4-Zimmer', 'barrierefrei', 'Balkon'"
                    },
                    {
                        id: 2,
                        question: "Was kostet der Deutschkurs?",
                        text: "Sprachkurs Deutsch A2\nIntensivkurs 4 Wochen\nMontag bis Freitag: 9:00 - 12:00 Uhr\n\nKosten: Kostenlos für Asylbewerber und Geduldete\nOrt: Volkshochschule, Raum 203",
                        options: ["A) 100 Euro", "B) 200 Euro", "C) Kostenlos für Berechtigte", "D) 50 Euro"],
                        correct: "C",
                        explanation: "Text: 'Kostenlos für Asylbewerber und Geduldete'"
                    },
                    {
                        id: 3,
                        question: "Wann hat das Fitness-Studio geöffnet?",
                        text: "FITNESS CENTER\n\nÖffnungszeiten:\nMontag - Freitag: 6:00 - 23:00 Uhr\nSamstag - Sonntag: 8:00 - 22:00 Uhr\n\nProbetraining kostenlos!",
                        options: ["A) Nur werktags", "B) Mo-Fr 6-23 Uhr, Wochenende 8-22 Uhr", "C) Nur am Wochenende", "D) 24 Stunden"],
                        correct: "B",
                        explanation: "Öffnungszeiten klar angegeben"
                    }
                ],
                2: [
                    {
                        id: 4,
                        question: "Warum kann Frau Schmidt nicht zur Arbeit kommen?",
                        text: "Sehr geehrte Frau Meier,\n\nleider kann ich heute nicht zur Arbeit kommen. Mein Sohn Tim (6 Jahre) ist sehr krank. Er hat hohes Fieber und der Arzt hat gesagt, er muss im Bett bleiben. Mein Mann ist auf Geschäftsreise und meine Mutter, die sonst hilft, ist auch krank.\n\nIch komme morgen wieder.\n\nAnna Schmidt",
                        options: ["A) Sie ist selbst krank", "B) Ihr Sohn ist krank und niemand kann aufpassen", "C) Sie hat Urlaub", "D) Ihr Mann ist im Krankenhaus"],
                        correct: "B",
                        explanation: "Sohn krank, Mann auf Geschäftsreise, Mutter krank"
                    },
                    {
                        id: 5,
                        question: "Was möchte der Mieter von der Hausverwaltung?",
                        text: "Betreff: Mängel in der Wohnung\n\nSehr geehrte Damen und Herren,\n\nich habe folgende Probleme:\n1. Die Heizung funktioniert nicht\n2. Das Licht im Bad flackert\n3. Der Wasserhahn tropft\n\nBitte beheben Sie diese Mängel. Sonst möchte ich die Miete mindern.\n\nMax Mustermann",
                        options: ["A) Er möchte kündigen", "B) Er möchte Reparaturen oder Mietminderung", "C) Er sucht eine neue Wohnung", "D) Er möchte umziehen"],
                        correct: "B",
                        explanation: "'Bitte beheben' oder 'Miete mindern'"
                    }
                ]
            },
            hoeren: {
                1: [
                    {
                        id: 6,
                        question: "🔊 Audio: Wann ist das Bürgerbüro geöffnet?",
                        audioText: "Guten Tag. Sie haben das Bürgeramt erreicht. Unsere Öffnungszeiten sind montags und mittwochs von 8 bis 12 Uhr und dienstags von 14 bis 18 Uhr. Donnerstags und freitags haben wir geschlossen.",
                        options: ["A) Mo+Mi 8-12 und Di 14-18", "B) Mo-Fr 8-16", "C) Nur Di", "D) Täglich"],
                        correct: "A",
                        explanation: "Audio: Mo+Mi 8-12, Di 14-18"
                    },
                    {
                        id: 7,
                        question: "🔊 Audio: Was soll der Anrufer tun?",
                        audioText: "Sie haben die Arztpraxis Dr. Weber erreicht. Bitte hinterlassen Sie Ihre Nachricht nach dem Signal. Nennen Sie Ihren Namen, Ihre Telefonnummer und den Grund Ihres Anrufs.",
                        options: ["A) Sofort kommen", "B) Nachricht mit Name, Telefon und Grund hinterlassen", "C) Morgen anrufen", "D) Online buchen"],
                        correct: "B",
                        explanation: "'Nachricht hinterlassen... Name, Telefonnummer, Grund'"
                    },
                    {
                        id: 8,
                        question: "🔊 Audio: Was macht die Frau am Wochenende?",
                        audioText: "Mann: Was machst du am Wochenende? Frau: Ich arbeite Samstag bis 22 Uhr. Aber Sonntag fahre ich mit den Kindern in den Zoo.",
                        options: ["A) Samstag arbeiten, Sonntag Zoo", "B) Ganze Woche arbeiten", "C) Zu Hause", "D) Umziehen"],
                        correct: "A",
                        explanation: "Samstag arbeiten, Sonntag Zoo"
                    }
                ],
                2: [
                    {
                        id: 9,
                        question: "🔊 Gespräch: Wo treffen sich die Freunde?",
                        audioText: "Mann: Sollen wir uns um 19 Uhr treffen? Frau: Ja, beim Italienischen Restaurant in der Hauptstraße. Mann: Gut, ich bringe meinen Bruder mit.",
                        options: ["A) Im Park", "B) Beim Italienischen Restaurant", "C) Zu Hause", "D) Im Kino"],
                        correct: "B",
                        explanation: "'beim Italienischen Restaurant'"
                    }
                ]
            },
            schreiben: {
                1: [
                    {
                        id: 10,
                        type: "writing",
                        task: "Schreiben Sie eine E-Mail an Ihren Chef",
                        situation: "Sie sind krank und können nicht zur Arbeit kommen",
                        minWords: 50,
                        maxWords: 80,
                        hints: ["Betreff: Krankmeldung", "Begründung", "Wann kommen Sie zurück?", "Höflicher Schluss"]
                    }
                ]
            }
        };

        let currentModule = 'lesen';
        let currentTeil = 1;
        let currentQuestions = [];
        let currentIndex = 0;
        let answered = false;

        function loadQuestions() {
            const module = document.getElementById('moduleSelect').value;
            const teil = document.getElementById('teilSelect').value;
            const content = document.getElementById('content');
            
            currentModule = module;
            currentTeil = parseInt(teil);
            
            // Get questions from inline data
            currentQuestions = QUESTIONS[module]?.[teil] || [];
            currentIndex = 0;
            
            if (currentQuestions.length === 0) {
                content.innerHTML = '<div style="text-align: center; padding: 40px;">Bu modül için henüz soru eklenmemiş.</div>';
                return;
            }
            
            showQuestion();
        }

        function showQuestion() {
            const content = document.getElementById('content');
            
            if (currentIndex >= currentQuestions.length) {
                content.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <h2>🎉 Bitti!</h2>
                        <p>Tüm soruları tamamladınız.</p>
                        <button onclick="loadQuestions()">Baştan Başla</button>
                    </div>
                `;
                return;
            }
            
            const q = currentQuestions[currentIndex];
            answered = false;
            
            let html = `
                <div class="question-box">
                    <div class="module-title">${currentModule.toUpperCase()} - Teil ${currentTeil}</div>
                    <div class="question-number">Soru ${currentIndex + 1} / ${currentQuestions.length}</div>
            `;
            
            // Audio button for Hören
            if (currentModule === 'hoeren' && q.audioText) {
                html += `
                    <div class="audio-btn" onclick="playAudio('${q.audioText.replace(/'/g, "\\'")}')">
                        🔊 Audio Dinle
                    </div>
                `;
            }
            
            // Reading text for Lesen
            if (q.text) {
                html += `<div class="reading-text">${q.text}</div>`;
            }
            
            // Question text
            html += `<div class="question-text">${q.question}</div>`;
            
            // Options
            if (q.options) {
                q.options.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    html += `<div class="option" id="opt-${letter}" onclick="checkAnswer('${letter}')">${opt}</div>`;
                });
            }
            
            // Writing task
            if (q.type === 'writing') {
                html += `
                    <div style="margin: 20px 0;">
                        <p><strong>Situation:</strong> ${q.situation}</p>
                        <p style="font-size: 13px; color: #94a3b8;">Kelime sayısı: ${q.minWords}-${q.maxWords}</p>
                        <textarea id="writing-text" style="width: 100%; height: 150px; padding: 10px; border-radius: 8px; font-size: 15px;" placeholder="Buraya yazın..."></textarea>
                        <div style="margin-top: 10px; font-size: 13px; color: #94a3b8;">
                            İpuçları: ${q.hints.join(' → ')}
                        </div>
                    </div>
                `;
            }
            
            // Feedback
            html += `<div id="feedback" class="feedback"></div>`;
            
            // Navigation
            html += `
                <div class="nav-buttons">
                    <button onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>← Önceki</button>
                    <button onclick="nextQuestion()">Sonraki →</button>
                </div>
                </div>
            `;
            
            content.innerHTML = html;
        }

        function playAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert('Tarayıcınız ses desteklemiyor');
            }
        }

        function checkAnswer(answer) {
            if (answered) return;
            answered = true;
            
            const q = currentQuestions[currentIndex];
            const correct = q.correct;
            const feedback = document.getElementById('feedback');
            
            // Show correct/wrong
            document.querySelectorAll('.option').forEach(opt => {
                opt.style.pointerEvents = 'none';
            });
            
            document.getElementById(`opt-${correct}`).classList.add('correct');
            
            if (answer !== correct) {
                document.getElementById(`opt-${answer}`).classList.add('wrong');
            }
            
            // Show feedback
            feedback.className = 'feedback show ' + (answer === correct ? 'correct' : 'wrong');
            feedback.innerHTML = `
                ${answer === correct ? '✅ Doğru!' : '❌ Yanlış!'}<br>
                <small>${q.explanation}</small>
            `;
        }

        function nextQuestion() {
            currentIndex++;
            showQuestion();
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }
    </script>
</body>
</html>
