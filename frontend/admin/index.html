<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - DTZ Lernplattform</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components-new.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/Chart.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --admin-sidebar-width: 280px;
            --admin-header-height: 70px;
            --admin-primary: #6366f1;
            --admin-success: #22c55e;
            --admin-warning: #f59e0b;
            --admin-danger: #ef4444;
        }
        
        .admin-app {
            display: flex;
            min-height: 100vh;
            background: var(--bg);
        }
        
        /* Sidebar */
        .admin-sidebar {
            width: var(--admin-sidebar-width);
            background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .sidebar-brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        
        .sidebar-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .sidebar-nav {
            padding: 1rem 0;
        }
        
        .nav-section {
            margin-bottom: 1.5rem;
        }
        
        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.5);
            padding: 0 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: #6366f1;
        }
        
        .nav-item-icon {
            width: 24px;
            text-align: center;
        }
        
        .nav-badge {
            margin-left: auto;
            background: var(--admin-danger);
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
        }
        
        /* Main Content */
        .admin-main {
            flex: 1;
            margin-left: var(--admin-sidebar-width);
            min-height: 100vh;
        }
        
        .admin-header {
            height: var(--admin-header-height);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .header-search {
            position: relative;
            width: 400px;
        }
        
        .header-search input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
        }
        
        .header-search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .header-btn {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .header-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .header-btn-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: var(--admin-danger);
            color: white;
            font-size: 0.65rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Content Area */
        .admin-content {
            padding: 2rem;
        }
        
        .page-header {
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
        }
        
        .page-header p {
            color: var(--text-muted);
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--admin-primary);
        }
        
        .stat-card.success::before { background: var(--admin-success); }
        .stat-card.warning::before { background: var(--admin-warning); }
        .stat-card.danger::before { background: var(--admin-danger); }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .stat-title {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(99, 102, 241, 0.1);
        }
        
        .stat-card.success .stat-icon { background: rgba(34, 197, 94, 0.1); color: var(--admin-success); }
        .stat-card.warning .stat-icon { background: rgba(245, 158, 11, 0.1); color: var(--admin-warning); }
        .stat-card.danger .stat-icon { background: rgba(239, 68, 68, 0.1); color: var(--admin-danger); }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .stat-change {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .stat-change.positive { color: var(--admin-success); }
        .stat-change.negative { color: var(--admin-danger); }
        
        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }
        
        .dashboard-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .dashboard-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dashboard-card-title {
            font-weight: 600;
        }
        
        .dashboard-card-body {
            padding: 1.5rem;
        }
        
        /* Activity List */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 12px;
            transition: all 0.2s;
        }
        
        .activity-item:hover {
            transform: translateX(4px);
        }
        
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-title {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        
        .activity-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .activity-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .quick-action {
            padding: 1.25rem;
            background: var(--bg);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
        }
        
        .quick-action:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        
        .quick-action-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .quick-action-label {
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        /* Table Styles */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .data-table th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .data-table tr:hover td {
            background: var(--bg);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .status-badge.active {
            background: rgba(34, 197, 94, 0.1);
            color: var(--admin-success);
        }
        .status-badge.active::before { background: var(--admin-success); }
        
        .status-badge.pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--admin-warning);
        }
        .status-badge.pending::before { background: var(--admin-warning); }
        
        .status-badge.inactive {
            background: rgba(148, 163, 184, 0.1);
            color: #64748b;
        }
        .status-badge.inactive::before { background: #64748b; }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
            }
            .admin-sidebar.open {
                transform: translateX(0);
            }
            .admin-main {
                margin-left: 0;
            }
            .stats-grid { grid-template-columns: 1fr; }
            .header-search { display: none; }
        }
    </style>
</head>
<body>
    <div class="admin-app">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-brand-icon">📚</div>
                    <div>
                        <div>DTZ Platform</div>
                        <small style="opacity: 0.6">Admin Panel</small>
                    </div>
                </div>
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar">A</div>
                    <div>
                        <div id="admin-name" style="font-weight: 500">Admin</div>
                        <small style="opacity: 0.6">Super Admin</small>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Hauptmenü</div>
                    <a href="#dashboard" class="nav-item active" data-page="dashboard">
                        <span class="nav-item-icon">📊</span>
                        Dashboard
                    </a>
                    <a href="#users" class="nav-item" data-page="users">
                        <span class="nav-item-icon">👥</span>
                        Benutzer
                        <span class="nav-badge" id="pending-users-badge">3</span>
                    </a>
                    <a href="#questions" class="nav-item" data-page="questions">
                        <span class="nav-item-icon">❓</span>
                        Fragen
                    </a>
                    <a href="#content" class="nav-item" data-page="content">
                        <span class="nav-item-icon">📝</span>
                        Inhalte
                        <span class="nav-badge" id="pending-content-badge">12</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">System</div>
                    <a href="#analytics" class="nav-item" data-page="analytics">
                        <span class="nav-item-icon">📈</span>
                        Analytics
                    </a>
                    <a href="#settings" class="nav-item" data-page="settings">
                        <span class="nav-item-icon">⚙️</span>
                        Einstellungen
                    </a>
                    <a href="#logs" class="nav-item" data-page="logs">
                        <span class="nav-item-icon">📋</span>
                        Logs
                    </a>
                    <a href="#health" class="nav-item" data-page="health">
                        <span class="nav-item-icon">🏥</span>
                        System Health
                    </a>
                </div>
                
                <div class="nav-section">
                    <a href="../dashboard.html" class="nav-item" style="margin-top: 2rem; color: #ef4444;">
                        <span class="nav-item-icon">🚪</span>
                        Abmelden
                    </a>
                </div>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="admin-main">
            <!-- Header -->
            <header class="admin-header">
                <div class="header-search">
                    <span class="header-search-icon">🔍</span>
                    <input type="text" placeholder="Suchen... (Cmd+K)" id="global-search">
                </div>
                <div class="header-actions">
                    <button class="header-btn" title="Benachrichtigungen">
                        🔔
                        <span class="header-btn-badge">5</span>
                    </button>
                    <button class="header-btn" title="Hilfe">❓</button>
                    <button class="header-btn" id="mobile-menu-toggle" style="display: none;">☰</button>
                </div>
            </header>
            
            <!-- Content Container -->
            <div class="admin-content" id="admin-content">
                <!-- Content will be loaded dynamically -->
            </div>
        </main>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/Chart.min.js"></script>
    <script src="admin-app.js"></script>
</body>
</html>
