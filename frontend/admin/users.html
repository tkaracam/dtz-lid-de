<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benutzer verwalten - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
        }
        
        .sidebar-logo {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #ff4757, #ff6348);
            color: white;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.65rem;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 0.25rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(124, 92, 255, 0.2);
            color: var(--accent);
        }
        
        .main-content {
            padding: 2rem;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 {
            font-size: 1.75rem;
        }
        
        .search-box {
            display: flex;
            gap: 0.5rem;
        }
        
        .search-box input {
            width: 300px;
        }
        
        .data-table {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }
        
        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .data-table th {
            background: rgba(124, 92, 255, 0.1);
            font-weight: 600;
        }
        
        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-premium {
            background: #2ed573;
            color: white;
        }
        
        .badge-free {
            background: var(--text-muted);
            color: white;
        }
        
        .badge-trial {
            background: var(--accent);
            color: white;
        }
        
        .badge-level {
            background: rgba(124, 92, 255, 0.2);
            color: var(--accent);
        }
        
        .btn-icon {
            padding: 0.5rem;
            border: none;
            background: none;
            color: var(--text);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: rgba(124, 92, 255, 0.2);
        }
        
        .btn-icon.delete:hover {
            background: #ff4757;
            color: white;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        
        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
        }
        
        .pagination button:hover:not(:disabled) {
            border-color: var(--accent);
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination button.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }
        
        .modal h2 {
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .modal-actions button {
            flex: 1;
        }
        
        @media (max-width: 1024px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .search-box input {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                DTZ <span class="admin-badge">ADMIN</span>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="users.html" class="nav-link active">👥 Benutzer</a>
                    </li>
                    <li class="nav-item">
                        <a href="questions.html" class="nav-link">❓ Fragen</a>
                    </li>
                    <li class="nav-item">
                        <a href="writing.html" class="nav-link">✍️ Schreiben</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" onclick="logout()" class="nav-link">🚪 Abmelden</a>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="header">
                <h1>Benutzer verwalten</h1>
                <div class="search-box">
                    <input type="text" class="input" id="search" placeholder="Suchen..." onkeyup="searchUsers()">
                    <button class="btn btn-primary" onclick="loadUsers()">🔍</button>
                </div>
            </div>
            
            <div class="data-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>E-Mail</th>
                            <th>Level</th>
                            <th>Status</th>
                            <th>Registriert</th>
                            <th>Aktionen</th>
                        </tr>
                    </thead>
                    <tbody id="users-table">
                        <tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Laden...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div class="pagination" id="pagination"></div>
        </main>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <h2>Benutzer bearbeiten</h2>
            <input type="hidden" id="edit-id">
            
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="input" id="edit-name">
            </div>
            
            <div class="form-group">
                <label>Level</label>
                <select class="input" id="edit-level">
                    <option value="A1">A1</option>
                    <option value="A2">A2</option>
                    <option value="B1">B1</option>
                    <option value="B2">B2</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Abonnement</label>
                <select class="input" id="edit-status">
                    <option value="free">Free</option>
                    <option value="trialing">Trial</option>
                    <option value="premium">Premium</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="edit-active"> Aktiv
                </label>
            </div>
            
            <div class="modal-actions">
                <button class="btn" onclick="closeModal()" style="background: var(--glass-bg);">Abbrechen</button>
                <button class="btn btn-primary" onclick="saveUser()">Speichern</button>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const user = getUser();
        if (!user || user.role !== 'admin') {
            window.location.href = 'login.html';
        }
        
        let currentPage = 1;
        let searchTerm = '';
        
        async function loadUsers(page = 1) {
            currentPage = page;
            searchTerm = document.getElementById('search').value;
            
            try {
                const response = await fetch(`${API_BASE}/admin/users.php?page=${page}&search=${encodeURIComponent(searchTerm)}`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    renderUsers(data.users);
                    renderPagination(data.page, data.pages);
                } else {
                    document.getElementById('users-table').innerHTML = 
                        `<tr><td colspan="7" style="text-align: center; color: #ff4757;">Fehler: ${data.error}</td></tr>`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('users-table').innerHTML = 
                    '<tr><td colspan="7" style="text-align: center; color: #ff4757;">Verbindungsfehler</td></tr>';
            }
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('users-table');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Keine Benutzer gefunden</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.display_name}</td>
                    <td>${u.email}</td>
                    <td><span class="badge badge-level">${u.level}</span></td>
                    <td><span class="badge badge-${u.subscription_status}">${u.subscription_status}</span></td>
                    <td>${new Date(u.created_at).toLocaleDateString('de-DE')}</td>
                    <td>
                        <button class="btn-icon" onclick="editUser(${u.id}, '${u.display_name}', '${u.level}', '${u.subscription_status}', ${u.is_active})">✏️</button>
                        <button class="btn-icon delete" onclick="deleteUser(${u.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderPagination(current, total) {
            const div = document.getElementById('pagination');
            if (total <= 1) {
                div.innerHTML = '';
                return;
            }
            
            let html = '';
            html += `<button ${current === 1 ? 'disabled' : ''} onclick="loadUsers(${current - 1})">←</button>`;
            
            for (let i = 1; i <= total; i++) {
                if (i === 1 || i === total || (i >= current - 1 && i <= current + 1)) {
                    html += `<button class="${i === current ? 'active' : ''}" onclick="loadUsers(${i})">${i}</button>`;
                } else if (i === current - 2 || i === current + 2) {
                    html += `<span>...</span>`;
                }
            }
            
            html += `<button ${current === total ? 'disabled' : ''} onclick="loadUsers(${current + 1})">→</button>`;
            div.innerHTML = html;
        }
        
        function searchUsers() {
            if (event.key === 'Enter') {
                loadUsers(1);
            }
        }
        
        function editUser(id, name, level, status, active) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-level').value = level;
            document.getElementById('edit-status').value = status;
            document.getElementById('edit-active').checked = active;
            document.getElementById('edit-modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }
        
        async function saveUser() {
            const id = document.getElementById('edit-id').value;
            const data = {
                id: parseInt(id),
                display_name: document.getElementById('edit-name').value,
                level: document.getElementById('edit-level').value,
                subscription_status: document.getElementById('edit-status').value,
                is_active: document.getElementById('edit-active').checked ? 1 : 0
            };
            
            try {
                const response = await fetch(`${API_BASE}/admin/users.php`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeModal();
                    loadUsers(currentPage);
                } else {
                    alert('Fehler: ' + result.error);
                }
            } catch (err) {
                alert('Verbindungsfehler');
            }
        }
        
        async function deleteUser(id) {
            if (!confirm('Benutzer wirklich löschen?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/users.php?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    loadUsers(currentPage);
                } else {
                    alert('Fehler: ' + result.error);
                }
            } catch (err) {
                alert('Verbindungsfehler');
            }
        }
        
        // Load on start
        loadUsers();
    </script>
</body>
</html>
