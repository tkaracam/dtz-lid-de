<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - DTZ Lernplattform</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .auth-box {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid var(--glass-border);
        }
        
        .auth-box h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
        }
        
        .auth-box p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .btn-full {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
        }
        
        .error-message {
            color: #ff4757;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
        }
        
        .error-message.show {
            display: block;
        }
        
        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff4757, #ff6348);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>Admin <span class="admin-badge">ADMIN</span></h1>
            <p>Verwaltungsbereich</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" class="input" id="email" required placeholder="admin@dtz.de">
                </div>
                
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" class="input" id="password" required placeholder="••••••••">
                </div>
                
                <div class="error-message" id="error"></div>
                
                <button type="submit" class="btn btn-primary btn-full">Anmelden</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="../login.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">
                    ← Zurück zum Login
                </a>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            
            try {
                const response = await fetch(`${API_BASE}/auth/login.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Check if admin
                    if (data.user.role !== 'admin') {
                        errorEl.textContent = 'Kein Admin-Zugriff';
                        errorEl.classList.add('show');
                        return;
                    }
                    
                    setToken(data.access_token);
                    setUser(data.user);
                    window.location.href = 'dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Anmeldung fehlgeschlagen';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.textContent = 'Verbindungsfehler';
                errorEl.classList.add('show');
            }
        });
    </script>
</body>
</html>
