<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | DTZ-LiD.de</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #1e293b;
      --text-muted: #64748b;
      --bg: #f8fafc;
      --white: #ffffff;
      --border: #e2e8f0;
      --error: #dc2626;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.visible {
      display: block;
    }

    .alert-error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link a:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-badge">🔒 Admin</div>
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">DTZ-LiD.de Verwaltungsbereich</p>
      </div>

      <div id="alert" class="alert alert-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-Mail</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="admin@dtz-lid.de"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Passwort</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••••"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Anmelden
        </button>
      </form>

      <div class="back-link">
        <a href="/">← Zurück zur Website</a>
      </div>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const alert = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      alert.classList.remove('visible');
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span>Anmeldung...';

      try {
        const result = await api.login({ email, password });

        if (result.success) {
          // Check if admin
          const me = await api.me();
          if (!me || !me.success) {
            throw new Error('Konnte Benutzer nicht laden');
          }
          
          // Verify admin status via admin API
          try {
            const adminCheck = await api.request('/api/admin/stats.php');
            if (adminCheck.error) {
              throw new Error('Kein Admin-Zugriff');
            }
            window.location.href = '/admin/dashboard.html';
          } catch (e) {
            alert.textContent = 'Kein Administrator-Zugriff';
            alert.classList.add('visible');
            api.clearTokens();
          }
        } else {
          alert.textContent = result.error || 'Anmeldung fehlgeschlagen';
          alert.classList.add('visible');
        }
      } catch (error) {
        alert.textContent = 'Ein Fehler ist aufgetreten';
        alert.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Anmelden';
      }
    });
  </script>
</body>
</html>
