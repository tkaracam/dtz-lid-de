<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Safari</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.98);
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .success {
            color: #27ae60;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Admin Login</h1>
        <p class="subtitle">Safari Compatible</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="admin@dtz-lid.de" value="admin@dtz-lid.de" required>
            <input type="password" id="password" placeholder="Şifre" value="Admin123!" required>
            <button type="submit">Giriş Yap</button>
        </form>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            errorDiv.style.display = 'none';
            successDiv.textContent = 'Giriş yapılıyor...';
            
            try {
                // Safari için tam URL
                const apiUrl = 'https://' + window.location.host + '/api/auth/login.php';
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success && data.access_token) {
                    // Safari localStorage fix
                    try {
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                    } catch(e) {
                        // Cookie fallback
                        document.cookie = 'token=' + data.access_token + '; path=/; max-age=86400';
                    }
                    
                    successDiv.textContent = '✅ Giriş başarılı! Yönlendiriliyor...';
                    
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || 'Giriş başarısız';
                    errorDiv.style.display = 'block';
                    successDiv.textContent = '';
                }
            } catch (err) {
                errorDiv.textContent = 'Bağlantı hatası: ' + err.message;
                errorDiv.style.display = 'block';
                successDiv.textContent = '';
            }
        });
    </script>
</body>
</html>
