<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Direct Login</title>
    <style>
        body { font-family: system-ui; max-width: 400px; margin: 50px auto; padding: 20px; }
        .box { background: #f5f5f5; padding: 30px; border-radius: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; }
        button { background: #6366f1; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        pre { overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 Admin Login (Debug)</h2>
        
        <input type="email" id="email" value="admin@dtz-lid.de" placeholder="Email">
        <input type="password" id="password" value="Admin123!" placeholder="Şifre">
        <button onclick="login()">Giriş Yap</button>
        <button onclick="checkSetup()">Setup Kontrol</button>
        
        <div id="result"></div>
    </div>

    <script>
        const API = 'https://www.dtz-lid.de/api';
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            
            result.innerHTML = 'Giriş yapılıyor...';
            
            try {
                const res = await fetch(`${API}/auth/login.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.access_token);
                    result.innerHTML = `
                        <div class="result">
                            ✅ Giriş başarılı!<br>
                            Token: <code>${data.access_token.substring(0, 50)}...</code><br>
                            Rol: ${data.user.role}<br>
                            <button onclick="goAdmin()">Admin Panel</button>
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="result error">❌ ${data.error}</div>`;
                }
            } catch (e) {
                result.innerHTML = `<div class="result error">❌ Hata: ${e.message}</div>`;
            }
        }
        
        async function checkSetup() {
            const result = document.getElementById('result');
            result.innerHTML = 'Kontrol ediliyor...';
            
            try {
                const res = await fetch(`${API}/admin/setup.php`);
                const data = await res.json();
                result.innerHTML = `<pre class="result">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (e) {
                result.innerHTML = `<div class="result error">❌ ${e.message}</div>`;
            }
        }
        
        function goAdmin() {
            window.location.href = '/admin/dashboard.html';
        }
    </script>
</body>
</html>
