<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DTZ-LiD.de</title>
  <style>
    :root {
      --ora-bg: #f6fbff;
      --ora-surface-soft: #f8fcff;
      --ora-text: #1f3142;
      --ora-muted: #587089;
      --ora-stroke: #d8e7f5;
      --ora-accent-a: #ff8a57;
      --ora-accent-b: #ff5f7f;
      --ora-shadow: 0 16px 36px rgba(35, 71, 108, 0.12);
      --ora-menu-text: #2b445b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ora-text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        #f6fbff;
    }
    .page-shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 90px) 0 60px;
    }
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-width: none;
      z-index: 1004;
      border-top: 1px solid var(--ora-stroke);
      border-bottom: 1px solid var(--ora-stroke);
      border-left: 0;
      border-right: 0;
      border-radius: 0;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) clamp(22px, 3.2vw, 38px) 14px clamp(10px, 1.4vw, 18px);
      background: #ffffff;
      box-shadow: none;
      backdrop-filter: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .nav-brand {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 1.08rem;
      letter-spacing: 0.01em;
      color: #1f3347;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      position: relative;
    }
    .nav-quick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .nav-links {
      position: fixed;
      top: 0;
      right: -100vw;
      height: 100vh;
      max-height: 100dvh;
      width: min(360px, 88vw);
      padding: 92px 24px 24px;
      background: #ffffff;
      border-left: 1px solid rgba(146, 181, 220, 0.2);
      box-shadow: -22px 0 48px rgba(0, 0, 0, 0.25);
      z-index: 1001;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow-y: auto;
      transition: right 0.28s ease;
    }
    .nav-link {
      text-decoration: none;
      color: var(--ora-menu-text);
      border: 1px solid var(--ora-stroke);
      background: var(--ora-surface-soft);
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.2;
      width: 100%;
      text-align: left;
      display: block;
      box-shadow: none;
      margin-bottom: 8px;
    }
    .nav-links .menu-cta {
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      border-color: transparent;
      font-weight: 700;
    }
    .nav-toggle {
      display: block;
      position: relative;
      z-index: 1002;
      pointer-events: auto;
      background: transparent;
      color: #2e4760;
      border: 0;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 0;
      margin-right: 10px;
    }
    .nav-toggle::after {
      content: "";
      display: block;
      margin-top: 3px;
      height: 2px;
      width: 100%;
      background: linear-gradient(90deg, var(--ora-accent-a), #36d5ff);
    }
    .quick-btn {
      text-decoration: none;
      color: var(--ora-menu-text);
      border: 1px solid var(--ora-stroke);
      background: var(--ora-surface-soft);
      padding: 6px 8px;
      border-radius: 10px;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1;
    }
    .quick-btn-primary,
    .quick-btn-primary:hover {
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      border-color: transparent;
    }
    .top-nav.open .nav-links { right: 0; display: flex; }
    .lang-switch { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .lang-toggle-btn {
      text-align: left; font-size: 0.9rem; font-weight: 700; border: 1px solid #d5e6f6;
      border-radius: 10px; padding: 9px 12px; display: flex; align-items: center;
      justify-content: space-between; background: #f8fcff; color: var(--ora-menu-text);
      width: 100%; cursor: pointer; font-family: "Sora", sans-serif;
    }
    .lang-toggle-btn::after { content: "▾"; font-size: 0.92rem; color: #537391; }
    .lang-switch-group.is-open .lang-toggle-btn::after { content: "▴"; }
    .lang-switch-list { display: none; flex-direction: column; gap: 10px; }
    .lang-switch-group.is-open .lang-switch-list { display: flex; }
    .lang-switch-list a {
      text-align: left; font-size: 0.9rem; font-weight: 700; border: 1px solid #d5e6f6;
      border-radius: 10px; padding: 9px 12px; display: flex; align-items: center;
      background: #f8fcff; color: var(--ora-menu-text); text-decoration: none;
    }
    .home-panel {
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--ora-stroke);
      background: linear-gradient(160deg, #ffffff, #f5faff);
      padding: 22px;
      box-shadow: var(--ora-shadow);
    }
    .home-panel h1 { margin: 0; font-size: 1rem; color: var(--ora-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .home-buttons {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .home-btn {
      min-height: 58px;
      border-radius: 12px;
      border: 1px solid #cfe2f2;
      background: #ffffff;
      color: #1f3347;
      font: inherit;
      font-weight: 700;
      font-size: 0.96rem;
      letter-spacing: 0.02em;
      cursor: pointer;
    }
    .home-btn:hover {
      border-color: #b8d5ec;
      background: #f8fcff;
    }
    .home-btn-group {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dtz-menu {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 0;
      border-radius: 12px;
      border: 0;
      background: transparent;
      box-shadow: none;
    }
    .home-btn-group.open .dtz-menu {
      display: flex;
    }
    .dtz-sub-btn {
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid #d8e7f5;
      background: #f8fcff;
      color: #1f3347;
      font: inherit;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      text-align: left;
      padding: 0 12px;
    }
    .site-footer {
      margin-top: 26px;
      border-top: 1px solid var(--ora-stroke);
      background: transparent;
      padding-top: 18px;
      color: var(--ora-muted);
      text-align: center;
    }
    .footer-links { display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; }
    .footer-link {
      color: #35506a; border: 1px solid #cfe2f2; border-radius: 999px; padding: 6px 10px;
      font-size: 0.82rem; background: #ffffff; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav id="memberTopNav" class="top-nav">
      <a class="nav-brand" href="./member.html?mode=login">DTZ-LiD</a>
      <div class="nav-right">
        <div class="nav-quick">
          <a class="quick-btn" href="./member.html?mode=login">Anmelden</a>
          <a class="quick-btn quick-btn-primary" href="./register.html">Registrieren</a>
        </div>
        <div class="nav-links">
          <a class="nav-link" href="./index.html">Kaffee</a>
          <a class="nav-link" href="./index.html">Katina</a>
          <a class="nav-link" href="./index.html">Tarot</a>
          <a class="nav-link" href="./member.html?mode=login">Anmelden</a>
          <a class="nav-link menu-cta" href="./register.html">Registrieren</a>
          <div class="lang-switch lang-switch-group" id="memberLangGroup">
            <button type="button" class="lang-toggle-btn" id="memberLangToggleBtn" aria-expanded="false">🌐 Sprachen</button>
            <div class="lang-switch-list" id="memberLangList" hidden>
              <a href="./index.html?lang=tr">🇹🇷 Türkisch</a>
              <a href="./index.html?lang=en">🇬🇧 Englisch</a>
              <a href="./index.html?lang=de">🇩🇪 Deutsch</a>
            </div>
          </div>
        </div>
      </div>
      <button id="memberNavToggleBtn" class="nav-toggle" type="button" aria-label="Navigation öffnen">Menu</button>
    </nav>

    <main>
      <section class="home-panel">
        <h1>Sekme</h1>
        <div class="home-buttons">
          <button class="home-btn" type="button">A1</button>
          <button class="home-btn" type="button">A2</button>
          <button class="home-btn" type="button">B1</button>
          <button class="home-btn" type="button">TEST</button>
          <div id="dtzBtnGroup" class="home-btn-group">
            <button id="dtzMenuBtn" class="home-btn" type="button" aria-expanded="false">DTZ</button>
            <div id="dtzMenu" class="dtz-menu">
              <button class="dtz-sub-btn" type="button">HÖREN</button>
              <button class="dtz-sub-btn" type="button">LESEN</button>
              <button class="dtz-sub-btn" type="button">SCHREIBEN (Mail korrigieren)</button>
              <button class="dtz-sub-btn" type="button">SPRECHEN</button>
            </div>
          </div>
          <button class="home-btn" type="button">LiD</button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a class="footer-link" href="./agb.html">AGB</a>
      </div>
    </footer>
  </div>

  <script>
    const memberNavToggleBtn = document.getElementById("memberNavToggleBtn");
    if (memberNavToggleBtn) {
      memberNavToggleBtn.addEventListener("click", () => {
        const nav = document.getElementById("memberTopNav");
        if (!nav) return;
        nav.classList.toggle("open");
      });
    }
    const memberLangToggleBtn = document.getElementById("memberLangToggleBtn");
    const memberLangGroup = document.getElementById("memberLangGroup");
    const memberLangList = document.getElementById("memberLangList");
    if (memberLangToggleBtn && memberLangGroup && memberLangList) {
      memberLangToggleBtn.addEventListener("click", () => {
        const nextOpen = !memberLangGroup.classList.contains("is-open");
        memberLangGroup.classList.toggle("is-open", nextOpen);
        memberLangList.hidden = !nextOpen;
        memberLangToggleBtn.setAttribute("aria-expanded", nextOpen ? "true" : "false");
      });
    }
    document.addEventListener("click", event => {
      const nav = document.getElementById("memberTopNav");
      if (!nav || !nav.classList.contains("open")) return;
      const target = event.target;
      if (!(target instanceof Node)) return;
      if (!nav.contains(target)) {
        nav.classList.remove("open");
      }
    });

    const dtzBtnGroup = document.getElementById("dtzBtnGroup");
    const dtzMenuBtn = document.getElementById("dtzMenuBtn");
    if (dtzBtnGroup && dtzMenuBtn) {
      dtzMenuBtn.addEventListener("click", () => {
        const nextOpen = !dtzBtnGroup.classList.contains("open");
        dtzBtnGroup.classList.toggle("open", nextOpen);
        dtzMenuBtn.setAttribute("aria-expanded", nextOpen ? "true" : "false");
      });
      document.addEventListener("click", event => {
        const target = event.target;
        if (!(target instanceof Node)) return;
        if (!dtzBtnGroup.contains(target)) {
          dtzBtnGroup.classList.remove("open");
          dtzMenuBtn.setAttribute("aria-expanded", "false");
        }
      });
    }
  </script>
</body>
</html>
