<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DTZ Learning">
    <meta name="description" content="Interaktive Lernplattform für den Deutsch-Test für Zuwanderer (DTZ)">
    
    <!-- No caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>DTZ Lernplattform - Deutsch-Test für Zuwanderer</title>
    
    <link rel="manifest" href="/manifest.json?v=2">
    <link rel="apple-touch-icon" href="/frontend/img/icon-192x192.png">
    <link rel="stylesheet" href="frontend/css/styles.css?v=2">
    <link rel="stylesheet" href="frontend/css/mobile.css?v=2">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        .hero { min-height: 100vh; display: flex; flex-direction: column; }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(30, 30, 50, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: #f1f5f9; text-decoration: none; font-weight: 500; }
        .btn-nav {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white; border: none; border-radius: 50px;
            font-weight: 600; cursor: pointer; text-decoration: none;
        }
        .hero-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 3rem; gap: 4rem; max-width: 1400px; margin: 0 auto;
        }
        .hero-text { flex: 1; }
        .hero-text h1 {
            font-size: 3.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-text p { font-size: 1.25rem; color: #94a3b8; margin-bottom: 2rem; }
        .hero-buttons { display: flex; gap: 1rem; }
        .btn {
            padding: 1rem 2rem; border-radius: 50px; font-weight: 600;
            text-decoration: none; transition: transform 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }
        .btn-secondary {
            border: 2px solid rgba(255,255,255,0.2); color: white;
            background: transparent;
        }
        @media (max-width: 768px) {
            .hero-content { flex-direction: column; text-align: center; padding: 2rem; }
            .hero-text h1 { font-size: 2.5rem; }
            .navbar { padding: 1rem 1.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <nav class="navbar">
            <div class="logo">DTZ Lernplattform</div>
            <div class="nav-links">
                <a href="frontend/login.html">Anmelden</a>
                <a href="frontend/register.html" class="btn-nav">Registrieren</a>
            </div>
        </nav>
        
        <div class="hero-content">
            <div class="hero-text">
                <h1>Bereite dich optimal auf den DTZ vor</h1>
                <p>Interaktive Übungen für Hören, Lesen, Schreiben und Sprechen. Mit KI-gestütztem Feedback!</p>
                <div class="hero-buttons">
                    <a href="frontend/register.html" class="btn btn-primary">Kostenlos starten</a>
                    <a href="frontend/login.html" class="btn btn-secondary">Anmelden</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Clear any old service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for (const reg of regs) reg.unregister();
            });
            if ('caches' in window) {
                caches.keys().then(keys => {
                    for (const key of keys) caches.delete(key);
                });
            }
        }
    </script>
</body>
</html>
