<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DTZ-LiD.de</title>
  <style>
    :root {
      --bg: #f6fbff;
      --surface: #ffffff;
      --surface-soft: #f8fcff;
      --text: #1f3142;
      --muted: #587089;
      --stroke: #d8e7f5;
      --accent-a: #ff8a57;
      --accent-b: #ff5f7f;
      --menu-text: #2b445b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        var(--bg);
      display: flex;
      flex-direction: column;
    }
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 1000;
      border-top: 1px solid var(--stroke);
      border-bottom: 1px solid var(--stroke);
      padding: calc(env(safe-area-inset-top, 0px) + 14px) clamp(22px, 3.2vw, 38px) 14px clamp(10px, 1.4vw, 18px);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .nav-brand {
      text-decoration: none;
      color: #1f3347;
      font-weight: 700;
      font-size: 1.08rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .nav-quick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .quick-btn {
      text-decoration: none;
      color: var(--menu-text);
      border: 1px solid var(--stroke);
      background: var(--surface-soft);
      padding: 6px 8px;
      border-radius: 10px;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1;
    }
    .quick-btn-primary {
      background: linear-gradient(95deg, var(--accent-a), var(--accent-b));
      color: #210f1a;
      border-color: transparent;
    }
    .page-shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 98px) 0 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .empty-tab {
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--stroke);
      background: linear-gradient(160deg, #ffffff, #f5faff);
      min-height: 420px;
      padding: 22px;
    }
    .empty-tab h1 {
      margin: 0;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .empty-content {
      margin-top: 16px;
      border-radius: 12px;
      border: 1px dashed #c6dbef;
      background: #fbfdff;
      min-height: 320px;
    }
    .site-footer {
      width: min(1120px, 92vw);
      margin: 0 auto 20px;
      border-top: 1px solid var(--stroke);
      padding-top: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.88rem;
    }
    .footer-links {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .footer-link {
      text-decoration: none;
      color: #35506a;
      border: 1px solid #cfe2f2;
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a class="nav-brand" href="./member.html?mode=login">DTZ-LiD</a>
    <div class="nav-quick">
      <a class="quick-btn" href="./member.html?mode=login">Anmelden</a>
      <a class="quick-btn quick-btn-primary" href="./register.html">Registrieren</a>
    </div>
  </nav>

  <main class="page-shell">
    <section class="empty-tab">
      <h1>Sekme</h1>
      <div class="empty-content"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span>DTZ-LiD.de</span>
    <div class="footer-links">
      <a class="footer-link" href="./agb.html">AGB</a>
    </div>
  </footer>
</body>
</html>
