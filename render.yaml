services:
  - type: web
    name: dtz-lernplattform
    runtime: docker
    repo: https://github.com/tkaracam/dtz-lid-de
    branch: main
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_DRIVER
        value: sqlite
      - key: DB_PATH
        value: /var/www/html/database/dtz_production.db
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: AZURE_TTS_KEY
        sync: false
      - key: AZURE_TTS_REGION
        value: westeurope
    disk:
      name: database
      mountPath: /var/www/html/database
      sizeGB: 1
    healthCheckPath: /api/health.php
    autoDeploy: true
