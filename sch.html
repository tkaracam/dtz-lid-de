<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schreiben | DTZ-LiD.de</title>
  <style>
    :root {
      --ora-bg: #f6fbff;
      --ora-text: #1f3142;
      --ora-stroke: #d8e7f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ora-text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        var(--ora-bg);
    }
    .page-shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 90px) 0 60px;
    }
    .card {
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--ora-stroke);
      background: linear-gradient(160deg, #ffffff, #f5faff);
      padding: 22px;
      max-width: 860px;
    }
    h1 { margin: 0; }
    .section-subtitle {
      margin: 0;
      color: #587089;
      font-size: 0.92rem;
    }
    .card-accordion {
      border: 1px solid #d6e4f3;
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
      margin-top: 12px;
    }
    .card-accordion-summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      padding: 12px;
      background: #f9fcff;
    }
    .card-accordion-summary::-webkit-details-marker { display: none; }
    .card-accordion-summary::marker { content: ""; }
    .title-wrap { display: grid; gap: 6px; }
    .card-accordion-icon {
      color: #2e4c67;
      font-weight: 700;
      transition: transform 0.18s ease;
    }
    .card-accordion[open] .card-accordion-icon { transform: rotate(180deg); }
    .card-accordion-body { padding: 12px; border-top: 1px solid #e3edf8; }
    .portal-list {
      border: 1px dashed #cdddf0;
      border-radius: 10px;
      background: #f8fbff;
      padding: 12px;
      color: #35506a;
      font-size: 0.9rem;
    }
    .field-label {
      display: block;
      margin-bottom: 6px;
      color: #284763;
      font-size: 0.84rem;
      font-weight: 700;
    }
    .topic-select {
      width: 100%;
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid #c8daef;
      background: #ffffff;
      color: #234363;
      font: inherit;
      font-weight: 600;
      padding: 7px 10px;
    }
    .mail-task-card {
      margin-top: 10px;
      border: 1px solid #d4e3f4;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .mail-task-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .mail-task-title {
      margin: 0;
      color: #1f3f60;
      font-size: 1.02rem;
      font-weight: 700;
    }
    .mail-task-state {
      border-radius: 999px;
      border: 1px solid #b9dff0;
      background: #ecfaff;
      color: #1e5d76;
      padding: 3px 9px;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .mail-task-text {
      margin: 0;
      color: #2d4f6e;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .mail-task-list {
      margin: 0;
      padding-left: 18px;
      color: #2d4f6e;
      line-height: 1.4;
    }
    .mail-started {
      display: inline-flex;
      width: fit-content;
      border-radius: 8px;
      border: 1px solid #cfe3a6;
      background: #f4ffd9;
      color: #4f6f13;
      padding: 4px 8px;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .mail-compose {
      margin-top: 10px;
      border: 1px solid #d4e3f4;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .mail-compose h4 {
      margin: 0;
      color: #1f3f60;
      font-size: 1rem;
    }
    .mail-note {
      margin: 0;
      color: #5d738b;
      font-size: 0.83rem;
    }
    .mail-textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid #c8daef;
      border-radius: 10px;
      background: #fbfeff;
      color: #223f5b;
      font: inherit;
      line-height: 1.45;
      padding: 10px;
    }
    .upload-btn {
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid transparent;
      font: inherit;
      font-weight: 700;
      color: #210f1a;
      background: linear-gradient(95deg, #ff8a57, #ff5f7f);
      cursor: pointer;
      padding: 8px 14px;
      width: 100%;
    }
    .ai-btn {
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid #b9cfe6;
      font: inherit;
      font-weight: 700;
      color: #234566;
      background: #eef6ff;
      cursor: pointer;
      padding: 8px 14px;
      width: 100%;
      margin-top: 8px;
    }
    .upload-status {
      margin: 4px 0 0;
      font-size: 0.84rem;
      font-weight: 600;
      color: #3b5772;
      min-height: 1.2em;
    }
    .upload-status.error { color: #b1324f; }
    .upload-status.success { color: #2e6c3f; }
    .ai-result {
      margin: 8px 0 0;
      border: 1px solid #d6e4f3;
      border-radius: 10px;
      background: #f9fcff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .ai-result-head {
      margin: 0;
      color: #1f3f60;
      font-size: 0.92rem;
      font-weight: 700;
    }
    .ai-result-text {
      margin: 0;
      color: #2d4f6e;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 0.9rem;
    }
    .task-notify-badge {
      display: inline-flex;
      margin-left: 6px;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #ff6f61;
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0 6px;
    }
    .hidden { display: none !important; }
  </style>
  <script defer src="/assets/site-shell.js"></script>
</head>
<body>
  <div class="page-shell">
    <main>
      <section class="card">
        <h1>Schreiben</h1>

        <div class="title-wrap" style="margin-top:14px;">
          <h3 style="margin:0;">Mail schreiben und prüfen <span id="portalTaskNotifyBadge" class="task-notify-badge hidden">0</span></h3>
          <p class="section-subtitle">Mail-Aufgabe auswählen, bearbeiten und direkt hochladen.</p>
        </div>
        <div id="portalMailHomeworkWrap" class="portal-list" style="margin-top:12px;">
          <label class="field-label" for="mailTopicSelect">Thema auswählen</label>
          <select id="mailTopicSelect" class="topic-select"></select>

          <section class="mail-task-card">
            <div class="mail-task-head">
              <h4 id="mailTaskTitle" class="mail-task-title"></h4>
              <span class="mail-task-state">Läuft</span>
            </div>
            <p id="mailTaskPrompt" class="mail-task-text"></p>
            <ul id="mailTaskBullets" class="mail-task-list"></ul>
            <span class="mail-started">BEREITS GESTARTET</span>
          </section>

          <section class="mail-compose">
            <h4>Ihre Mail</h4>
            <p class="mail-note">Kopieren, Einfügen und Ausschneiden sind gesperrt.</p>
            <p class="mail-note">Empfehlung: 50-80 Wörter für B1-Ziel.</p>
            <textarea id="mailBodyInput" class="mail-textarea" placeholder="Schreiben Sie hier Ihre Mail..."></textarea>
            <button id="mailUploadBtn" class="upload-btn" type="button">BRIEF HOCHLADEN</button>
            <button id="mailAiBtn" class="ai-btn" type="button">KI KORREKTUR</button>
            <p id="mailUploadStatus" class="upload-status" aria-live="polite"></p>
            <div id="mailAiResult" class="ai-result hidden">
              <p id="mailAiHead" class="ai-result-head"></p>
              <p id="mailAiFeedback" class="ai-result-text"></p>
              <p id="mailAiCorrected" class="ai-result-text"></p>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script>
    const mailTopics = [
      {
        id: "krankmeldung-kurs",
        title: "Krankmeldung im Kurs",
        prompt: "Sie schreiben Ihrer Kursleiterin eine E-Mail. Sie können morgen nicht zum Deutschkurs kommen, weil Sie einen Arzttermin haben. Schreiben Sie eine E-Mail.",
        bullets: [
          "Entschuldigen Sie sich und nennen Sie den Grund.",
          "Nennen Sie den Termin (z. B. morgen) und was passiert.",
          "Bitten Sie um eine Information oder ein Ersatzmaterial."
        ]
      },
      {
        id: "lauter-nachbar",
        title: "Lauter Nachbar",
        prompt: "Sie schreiben Ihrem Nachbarn. Er hört spät abends sehr laut Musik. Schreiben Sie eine Nachricht.",
        bullets: [
          "Beschreiben Sie das Problem.",
          "Sagen Sie, wann es besonders stört.",
          "Bitten Sie um eine Lösung oder Änderung."
        ]
      },
      {
        id: "termin-verschieben-behoerde",
        title: "Termin verschieben (Behörde)",
        prompt: "Sie haben einen Termin im Bürgerbüro, können aber nicht kommen. Schreiben Sie eine E-Mail und bitten Sie um einen neuen Termin.",
        bullets: [
          "Nennen Sie den Grund.",
          "Schlagen Sie einen neuen Termin vor.",
          "Bitten Sie um Bestätigung."
        ]
      },
      {
        id: "kursbescheinigung",
        title: "Kursbescheinigung",
        prompt: "Sie brauchen eine Teilnahmebescheinigung für Ihren Deutschkurs. Schreiben Sie an die Schule.",
        bullets: [
          "Erklären Sie, wofür Sie die Bescheinigung brauchen.",
          "Nennen Sie Ihren Kurs.",
          "Bitten Sie um schnelle Bearbeitung."
        ]
      },
      {
        id: "wohnung-heizung-defekt",
        title: "Wohnung: Heizung defekt",
        prompt: "In Ihrer Wohnung ist die Heizung kaputt. Schreiben Sie an die Hausverwaltung.",
        bullets: [
          "Beschreiben Sie den Schaden.",
          "Nennen Sie, seit wann es das Problem gibt.",
          "Bitten Sie um Reparatur und Rückmeldung."
        ]
      },
      {
        id: "arbeit-schicht-tauschen",
        title: "Arbeit: Schicht tauschen",
        prompt: "Sie möchten Ihre Schicht am Freitag tauschen. Schreiben Sie Ihrer Teamleitung.",
        bullets: [
          "Sagen Sie, warum Sie tauschen möchten.",
          "Schlagen Sie eine Alternative vor.",
          "Bitten Sie um eine kurze Antwort."
        ]
      },
      {
        id: "kind-krank-schule",
        title: "Kind krank (Schule)",
        prompt: "Ihr Kind ist krank und kann morgen nicht in die Schule. Schreiben Sie eine kurze Nachricht an die Schule.",
        bullets: [
          "Entschuldigen Sie das Fehlen.",
          "Nennen Sie den Zeitraum.",
          "Bitten Sie um Hausaufgaben oder Infos."
        ]
      },
      {
        id: "bibliothek-ausweis-verlaengern",
        title: "Bibliothek: Ausweis verlängern",
        prompt: "Ihr Bibliotheksausweis läuft ab. Schreiben Sie an die Bibliothek.",
        bullets: [
          "Nennen Sie Ihren Ausweis.",
          "Bitten Sie um Verlängerung.",
          "Fragen Sie nach den Öffnungszeiten."
        ]
      },
      {
        id: "arzttermin-absagen",
        title: "Arzttermin absagen",
        prompt: "Sie haben einen Arzttermin, können aber nicht kommen. Schreiben Sie an die Praxis.",
        bullets: [
          "Nennen Sie den Termin.",
          "Sagen Sie den Grund.",
          "Bitten Sie um einen neuen Termin."
        ]
      },
      {
        id: "kursmaterial-fehlt",
        title: "Kursmaterial fehlt",
        prompt: "Sie haben das Kursmaterial verpasst. Schreiben Sie an die Lehrkraft.",
        bullets: [
          "Sagen Sie, was fehlt.",
          "Nennen Sie den Grund.",
          "Bitten Sie um das Material."
        ]
      },
      {
        id: "arbeit-urlaub-beantragen",
        title: "Arbeit: Urlaub beantragen",
        prompt: "Sie möchten im Juli eine Woche Urlaub. Schreiben Sie an Ihre Vorgesetzte.",
        bullets: [
          "Nennen Sie den Zeitraum.",
          "Sagen Sie, warum Sie Urlaub brauchen.",
          "Bitten Sie um Bestätigung."
        ]
      },
      {
        id: "nachhilfe-anfragen",
        title: "Nachhilfe anfragen",
        prompt: "Sie suchen Nachhilfe in Deutsch. Schreiben Sie an eine Nachhilfeschule.",
        bullets: [
          "Nennen Sie Ihr Niveau.",
          "Sagen Sie, wann Sie Zeit haben.",
          "Fragen Sie nach den Kosten."
        ]
      },
      {
        id: "sportverein-kuendigen",
        title: "Sportverein kündigen",
        prompt: "Sie möchten aus dem Sportverein austreten. Schreiben Sie eine E-Mail.",
        bullets: [
          "Nennen Sie Ihren Namen.",
          "Sagen Sie, ab wann Sie kündigen möchten.",
          "Bitten Sie um Bestätigung der Kündigung."
        ]
      },
      {
        id: "wohnung-besichtigen",
        title: "Wohnung besichtigen",
        prompt: "Sie haben eine Wohnungsanzeige gesehen. Schreiben Sie an die Vermieterin und bitten Sie um einen Besichtigungstermin.",
        bullets: [
          "Sagen Sie, welche Wohnung.",
          "Schlagen Sie Termine vor.",
          "Stellen Sie sich kurz vor."
        ]
      },
      {
        id: "kita-platz",
        title: "Kita-Platz",
        prompt: "Sie suchen einen Kita-Platz für Ihr Kind. Schreiben Sie an eine Kita.",
        bullets: [
          "Nennen Sie das Alter des Kindes.",
          "Sagen Sie, ab wann Sie den Platz brauchen.",
          "Bitten Sie um Rückmeldung."
        ]
      },
      {
        id: "reklamation-lieferung",
        title: "Reklamation: Lieferung",
        prompt: "Sie haben eine Bestellung erhalten, aber ein Teil fehlt. Schreiben Sie an den Kundenservice.",
        bullets: [
          "Beschreiben Sie das Problem.",
          "Nennen Sie die Bestellnummer.",
          "Bitten Sie um Nachlieferung."
        ]
      },
      {
        id: "fehlende-arbeitsbescheinigung",
        title: "Fehlende Arbeitsbescheinigung",
        prompt: "Sie brauchen eine Arbeitsbescheinigung von Ihrer Firma. Schreiben Sie an die Personalabteilung.",
        bullets: [
          "Erklären Sie, wofür Sie die Bescheinigung brauchen.",
          "Nennen Sie Ihren Namen/Abteilung.",
          "Bitten Sie um schnelle Rückmeldung."
        ]
      },
      {
        id: "nachbarschaft-paket",
        title: "Nachbarschaft: Paket",
        prompt: "Ihr Paket wurde beim Nachbarn abgegeben. Schreiben Sie eine kurze Nachricht.",
        bullets: [
          "Sagen Sie, dass Ihr Paket dort ist.",
          "Bitten Sie um Abholung.",
          "Schlagen Sie eine Uhrzeit vor."
        ]
      },
      {
        id: "jobcenter-termin",
        title: "Jobcenter: Termin",
        prompt: "Sie können einen Termin beim Jobcenter nicht wahrnehmen. Schreiben Sie eine E-Mail.",
        bullets: [
          "Nennen Sie den Termin.",
          "Sagen Sie den Grund.",
          "Bitten Sie um einen neuen Termin."
        ]
      },
      {
        id: "kurswechsel",
        title: "Kurswechsel",
        prompt: "Sie möchten von einem Abendkurs in einen Vormittagskurs wechseln. Schreiben Sie an die Schule.",
        bullets: [
          "Nennen Sie Ihren aktuellen Kurs.",
          "Sagen Sie, warum Sie wechseln möchten.",
          "Bitten Sie um einen Wechseltermin."
        ]
      }
    ];

    const topicSelect = document.getElementById("mailTopicSelect");
    const taskTitle = document.getElementById("mailTaskTitle");
    const taskPrompt = document.getElementById("mailTaskPrompt");
    const taskBullets = document.getElementById("mailTaskBullets");
    const bodyInput = document.getElementById("mailBodyInput");
    const uploadBtn = document.getElementById("mailUploadBtn");
    const aiBtn = document.getElementById("mailAiBtn");
    const uploadStatus = document.getElementById("mailUploadStatus");
    const aiResultBox = document.getElementById("mailAiResult");
    const aiHead = document.getElementById("mailAiHead");
    const aiFeedback = document.getElementById("mailAiFeedback");
    const aiCorrected = document.getElementById("mailAiCorrected");

    let activeTopic = null;

    function setUploadStatus(type, text) {
      if (!uploadStatus) return;
      uploadStatus.classList.remove("error", "success");
      if (type === "error" || type === "success") uploadStatus.classList.add(type);
      uploadStatus.textContent = String(text || "");
    }

    function renderTopic(topic) {
      if (!topic) return;
      activeTopic = topic;
      taskTitle.textContent = topic.title;
      taskPrompt.textContent = topic.prompt;
      taskBullets.innerHTML = "";
      (topic.bullets || []).forEach((line) => {
        const li = document.createElement("li");
        li.textContent = line;
        taskBullets.appendChild(li);
      });
      if (aiResultBox) aiResultBox.classList.add("hidden");
    }

    function initTopics() {
      if (!topicSelect) return;
      mailTopics.forEach((topic, idx) => {
        const opt = document.createElement("option");
        opt.value = topic.id;
        opt.textContent = topic.title;
        if (idx === 0) opt.selected = true;
        topicSelect.appendChild(opt);
      });
      topicSelect.addEventListener("change", () => {
        const topic = mailTopics.find((t) => t.id === topicSelect.value) || mailTopics[0];
        renderTopic(topic);
      });
      renderTopic(mailTopics[0]);
    }

    async function submitMailToAdmin() {
      const text = String((bodyInput && bodyInput.value) || "").trim();
      if (!text) {
        setUploadStatus("error", "Bitte zuerst Ihre Mail schreiben.");
        return;
      }
      if (!activeTopic) {
        setUploadStatus("error", "Bitte zuerst ein Thema auswählen.");
        return;
      }
      if (!uploadBtn) return;

      const payload = {
        student_name: "",
        task_prompt: `${activeTopic.title}\n${activeTopic.prompt}`,
        required_points: Array.isArray(activeTopic.bullets) ? activeTopic.bullets : [],
        letter_text: text,
        writing_duration_seconds: 0,
        writing_started_at: ""
      };

      uploadBtn.disabled = true;
      setUploadStatus("", "Wird hochgeladen...");
      try {
        const response = await fetch("./api/member_save_letter.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data || data.ok !== true) {
          throw new Error(String(data?.error || "Upload fehlgeschlagen."));
        }
        if (bodyInput) bodyInput.value = "";
        setUploadStatus("success", `An Admin gesendet. Upload-ID: ${String(data.upload_id || "-")}`);
      } catch (error) {
        setUploadStatus("error", String(error?.message || "Upload fehlgeschlagen."));
      } finally {
        uploadBtn.disabled = false;
      }
    }

    async function runAiCorrection() {
      const text = String((bodyInput && bodyInput.value) || "").trim();
      if (!text) {
        setUploadStatus("error", "Bitte zuerst Ihre Mail schreiben.");
        return;
      }
      if (!activeTopic) {
        setUploadStatus("error", "Bitte zuerst ein Thema auswählen.");
        return;
      }
      if (!aiBtn) return;

      aiBtn.disabled = true;
      setUploadStatus("", "KI-Korrektur läuft...");
      try {
        const response = await fetch("./api/member_correct.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            letter_text: text,
            task_prompt: `${activeTopic.title}\n${activeTopic.prompt}`,
            required_points: Array.isArray(activeTopic.bullets) ? activeTopic.bullets : []
          })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(String(data?.error || "KI-Korrektur fehlgeschlagen."));
        }
        if (aiHead) aiHead.textContent = `Ergebnis: ${String(data.score_total ?? "-")}/20 · Niveau: ${String(data.niveau_einschaetzung || "-")}`;
        if (aiFeedback) aiFeedback.textContent = String(data.teacher_feedback_de || "");
        if (aiCorrected) aiCorrected.textContent = `Korrigierte Version:\n${String(data.corrected_letter || "")}`;
        if (aiResultBox) aiResultBox.classList.remove("hidden");
        setUploadStatus("success", "KI-Korrektur fertig.");
      } catch (error) {
        setUploadStatus("error", String(error?.message || "KI-Korrektur fehlgeschlagen."));
      } finally {
        aiBtn.disabled = false;
      }
    }

    if (bodyInput) {
      ["copy", "cut", "paste"].forEach((evt) => {
        bodyInput.addEventListener(evt, (event) => event.preventDefault());
      });
    }

    if (uploadBtn) {
      uploadBtn.addEventListener("click", submitMailToAdmin);
    }
    if (aiBtn) {
      aiBtn.addEventListener("click", runAiCorrection);
    }

    initTopics();
  </script>
</body>
</html>
