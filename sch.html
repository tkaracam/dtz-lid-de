<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schreiben | DTZ-LiD.de</title>
  <style>
    :root {
      --ora-bg: #f6fbff;
      --ora-text: #1f3142;
      --ora-stroke: #d8e7f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ora-text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        var(--ora-bg);
    }
    .page-shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 90px) 0 60px;
    }
    .card {
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--ora-stroke);
      background: linear-gradient(160deg, #ffffff, #f5faff);
      padding: 22px;
      max-width: 860px;
    }
    h1 { margin: 0; }
    .section-subtitle {
      margin: 0;
      color: #587089;
      font-size: 0.92rem;
    }
    .card-accordion {
      border: 1px solid #d6e4f3;
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
      margin-top: 12px;
    }
    .card-accordion-summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      padding: 12px;
      background: #f9fcff;
    }
    .card-accordion-summary::-webkit-details-marker { display: none; }
    .card-accordion-summary::marker { content: ""; }
    .title-wrap { display: grid; gap: 6px; }
    .card-accordion-icon {
      color: #2e4c67;
      font-weight: 700;
      transition: transform 0.18s ease;
    }
    .card-accordion[open] .card-accordion-icon { transform: rotate(180deg); }
    .card-accordion-body { padding: 12px; border-top: 1px solid #e3edf8; }
    .portal-list {
      border: 1px dashed #cdddf0;
      border-radius: 10px;
      background: #f8fbff;
      padding: 12px;
      color: #35506a;
      font-size: 0.9rem;
    }
    .field-label {
      display: block;
      margin-bottom: 6px;
      color: #284763;
      font-size: 0.84rem;
      font-weight: 700;
    }
    .topic-select {
      width: 100%;
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid #c8daef;
      background: #ffffff;
      color: #234363;
      font: inherit;
      font-weight: 600;
      padding: 7px 10px;
    }
    .mail-task-card {
      margin-top: 10px;
      border: 1px solid #d4e3f4;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .mail-task-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .mail-task-title {
      margin: 0;
      color: #1f3f60;
      font-size: 1.02rem;
      font-weight: 700;
    }
    .mail-task-state {
      border-radius: 999px;
      border: 1px solid #b9dff0;
      background: #ecfaff;
      color: #1e5d76;
      padding: 3px 9px;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .mail-task-text {
      margin: 0;
      color: #2d4f6e;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .mail-task-list {
      margin: 0;
      padding-left: 18px;
      color: #2d4f6e;
      line-height: 1.4;
    }
    .mail-task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: #355a7a;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .mail-started {
      display: inline-flex;
      width: fit-content;
      border-radius: 8px;
      border: 1px solid #cfe3a6;
      background: #f4ffd9;
      color: #4f6f13;
      padding: 4px 8px;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .mail-compose {
      margin-top: 10px;
      border: 1px solid #d4e3f4;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .mail-compose h4 {
      margin: 0;
      color: #1f3f60;
      font-size: 1rem;
    }
    .mail-note {
      margin: 0;
      color: #5d738b;
      font-size: 0.83rem;
    }
    .mail-textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid #c8daef;
      border-radius: 10px;
      background: #fbfeff;
      color: #223f5b;
      font: inherit;
      line-height: 1.45;
      padding: 10px;
    }
    .upload-btn {
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid transparent;
      font: inherit;
      font-weight: 700;
      color: #210f1a;
      background: linear-gradient(95deg, #ff8a57, #ff5f7f);
      cursor: pointer;
      padding: 8px 14px;
      width: 100%;
    }
    .upload-status {
      margin: 4px 0 0;
      font-size: 0.84rem;
      font-weight: 600;
      color: #3b5772;
      min-height: 1.2em;
    }
    .upload-status.error { color: #b1324f; }
    .upload-status.success { color: #2e6c3f; }
    .task-notify-badge {
      display: inline-flex;
      margin-left: 6px;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #ff6f61;
      color: #ffffff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0 6px;
    }
    .hidden { display: none !important; }
  </style>
  <script defer src="/assets/site-shell.js"></script>
</head>
<body>
  <div class="page-shell">
    <main>
      <section class="card">
        <h1>Schreiben</h1>

        <details id="portalWriteAccordion" class="card-accordion" open>
          <summary class="card-accordion-summary">
            <div class="title-wrap">
              <h3 style="margin:0;">Mail schreiben und prüfen <span id="portalTaskNotifyBadge" class="task-notify-badge hidden">0</span></h3>
              <p class="section-subtitle">Mail-Aufgabe auswählen, bearbeiten und direkt hochladen.</p>
            </div>
            <span class="card-accordion-icon">▾</span>
          </summary>
          <div class="card-accordion-body">
            <div id="portalMailHomeworkWrap" class="portal-list">
              <label class="field-label" for="mailTopicSelect">Thema auswählen</label>
              <select id="mailTopicSelect" class="topic-select"></select>

              <section class="mail-task-card">
                <div class="mail-task-head">
                  <h4 id="mailTaskTitle" class="mail-task-title"></h4>
                  <span class="mail-task-state">Läuft</span>
                </div>
                <p id="mailTaskPrompt" class="mail-task-text"></p>
                <ul id="mailTaskBullets" class="mail-task-list"></ul>
                <div class="mail-task-meta">
                  <span id="mailTaskDuration">Dauer: 5 Std.</span>
                  <span>Abgabetimer: <span id="mailTimer">299:41</span></span>
                </div>
                <span class="mail-started">BEREITS GESTARTET</span>
              </section>

              <section class="mail-compose">
                <h4>Ihre Mail</h4>
                <p class="mail-note">Kopieren, Einfügen und Ausschneiden sind gesperrt.</p>
                <p class="mail-note">Empfehlung: 50-80 Wörter für B1-Ziel.</p>
                <textarea id="mailBodyInput" class="mail-textarea" placeholder="Schreiben Sie hier Ihre Mail..."></textarea>
                <button id="mailUploadBtn" class="upload-btn" type="button">BRIEF HOCHLADEN</button>
                <p id="mailUploadStatus" class="upload-status" aria-live="polite"></p>
              </section>
            </div>
          </div>
        </details>
      </section>
    </main>
  </div>
  <script>
    const mailTopics = [
      {
        id: "krankmeldung-kurs",
        title: "Krankmeldung im Kurs",
        prompt: "Sie schreiben Ihrer Kursleiterin eine E-Mail. Sie können morgen nicht zum Deutschkurs kommen, weil Sie einen Arzttermin haben. Schreiben Sie eine E-Mail.",
        bullets: [
          "Entschuldigen Sie sich und nennen Sie den Grund.",
          "Nennen Sie den Termin (z. B. morgen) und was passiert.",
          "Bitten Sie um eine Information oder ein Ersatzmaterial."
        ],
        durationHours: 5,
        startRemainingSec: 299 * 60 + 41
      },
      {
        id: "termin-amt",
        title: "Termin bei Behörde verschieben",
        prompt: "Sie haben morgen einen Termin beim Amt, können aber nicht kommen. Schreiben Sie eine E-Mail.",
        bullets: [
          "Nennen Sie kurz den Grund.",
          "Bitten Sie um einen neuen Termin.",
          "Fragen Sie nach den nächsten freien Zeiten."
        ],
        durationHours: 5,
        startRemainingSec: 299 * 60 + 41
      },
      {
        id: "kindergarten-info",
        title: "Nachricht an Kindergarten",
        prompt: "Ihr Kind ist krank und kann morgen nicht in den Kindergarten. Schreiben Sie eine E-Mail.",
        bullets: [
          "Entschuldigen Sie Ihr Kind.",
          "Schreiben Sie, wie lange es ungefähr fehlt.",
          "Bitten Sie um die Aufgaben/Hinweise für zu Hause."
        ],
        durationHours: 5,
        startRemainingSec: 299 * 60 + 41
      }
    ];

    const topicSelect = document.getElementById("mailTopicSelect");
    const taskTitle = document.getElementById("mailTaskTitle");
    const taskPrompt = document.getElementById("mailTaskPrompt");
    const taskBullets = document.getElementById("mailTaskBullets");
    const taskDuration = document.getElementById("mailTaskDuration");
    const timerNode = document.getElementById("mailTimer");
    const bodyInput = document.getElementById("mailBodyInput");
    const uploadBtn = document.getElementById("mailUploadBtn");
    const uploadStatus = document.getElementById("mailUploadStatus");

    let currentRemainingSec = 299 * 60 + 41;
    let timerId = null;
    let activeTopic = null;

    function setUploadStatus(type, text) {
      if (!uploadStatus) return;
      uploadStatus.classList.remove("error", "success");
      if (type === "error" || type === "success") uploadStatus.classList.add(type);
      uploadStatus.textContent = String(text || "");
    }

    function formatTimer(totalSec) {
      const safe = Math.max(0, Number(totalSec || 0));
      const minutes = Math.floor(safe / 60);
      const seconds = safe % 60;
      return `${String(minutes)}:${String(seconds).padStart(2, "0")}`;
    }

    function stopTimer() {
      if (timerId) {
        window.clearInterval(timerId);
        timerId = null;
      }
    }

    function startTimer() {
      stopTimer();
      timerNode.textContent = formatTimer(currentRemainingSec);
      timerId = window.setInterval(() => {
        currentRemainingSec = Math.max(0, currentRemainingSec - 1);
        timerNode.textContent = formatTimer(currentRemainingSec);
        if (currentRemainingSec <= 0) stopTimer();
      }, 1000);
    }

    function renderTopic(topic) {
      if (!topic) return;
      activeTopic = topic;
      taskTitle.textContent = topic.title;
      taskPrompt.textContent = topic.prompt;
      taskBullets.innerHTML = "";
      (topic.bullets || []).forEach((line) => {
        const li = document.createElement("li");
        li.textContent = line;
        taskBullets.appendChild(li);
      });
      taskDuration.textContent = `Dauer: ${String(topic.durationHours || 5)} Std.`;
      currentRemainingSec = Number(topic.startRemainingSec || (299 * 60 + 41));
      startTimer();
    }

    function initTopics() {
      if (!topicSelect) return;
      mailTopics.forEach((topic, idx) => {
        const opt = document.createElement("option");
        opt.value = topic.id;
        opt.textContent = topic.title;
        if (idx === 0) opt.selected = true;
        topicSelect.appendChild(opt);
      });
      topicSelect.addEventListener("change", () => {
        const topic = mailTopics.find((t) => t.id === topicSelect.value) || mailTopics[0];
        renderTopic(topic);
      });
      renderTopic(mailTopics[0]);
    }

    async function submitMailToAdmin() {
      const text = String((bodyInput && bodyInput.value) || "").trim();
      if (!text) {
        setUploadStatus("error", "Bitte zuerst Ihre Mail schreiben.");
        return;
      }
      if (!activeTopic) {
        setUploadStatus("error", "Bitte zuerst ein Thema auswählen.");
        return;
      }
      if (!uploadBtn) return;

      const payload = {
        student_name: "",
        task_prompt: `${activeTopic.title}\n${activeTopic.prompt}`,
        required_points: Array.isArray(activeTopic.bullets) ? activeTopic.bullets : [],
        letter_text: text,
        writing_duration_seconds: Math.max(0, (Number(activeTopic.startRemainingSec || 0) - Number(currentRemainingSec || 0))),
        writing_started_at: new Date(Date.now() - Math.max(0, (Number(activeTopic.startRemainingSec || 0) - Number(currentRemainingSec || 0))) * 1000).toISOString()
      };

      uploadBtn.disabled = true;
      setUploadStatus("", "Wird hochgeladen...");
      try {
        const response = await fetch("./api/member_save_letter.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data || data.ok !== true) {
          throw new Error(String(data?.error || "Upload fehlgeschlagen."));
        }
        if (bodyInput) bodyInput.value = "";
        setUploadStatus("success", `An Admin gesendet. Upload-ID: ${String(data.upload_id || "-")}`);
      } catch (error) {
        setUploadStatus("error", String(error?.message || "Upload fehlgeschlagen."));
      } finally {
        uploadBtn.disabled = false;
      }
    }

    if (bodyInput) {
      ["copy", "cut", "paste"].forEach((evt) => {
        bodyInput.addEventListener(evt, (event) => event.preventDefault());
      });
    }

    if (uploadBtn) {
      uploadBtn.addEventListener("click", submitMailToAdmin);
    }

    initTopics();
  </script>
</body>
</html>
