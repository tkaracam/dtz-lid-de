<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lesen | DTZ-LiD.de</title>
  <style>
    :root {
      --ora-bg: #f6fbff;
      --ora-text: #1f3142;
      --ora-stroke: #d8e7f5;
      --ora-accent-a: #ff8a57;
      --ora-accent-b: #ff5f7f;
      --ora-shadow: 0 16px 36px rgba(35, 71, 108, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ora-text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        var(--ora-bg);
    }
    .page-shell {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 90px) 0 60px;
    }
    .card {
      margin-top: 20px;
      border-radius: 16px;
      border: 1px solid var(--ora-stroke);
      background: linear-gradient(160deg, #ffffff, #f5faff);
      padding: 22px;
      box-shadow: var(--ora-shadow);
      max-width: 860px;
    }
    .status {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #b8d5ec;
      background: #f3f9ff;
      color: #2e4c67;
      display: none;
    }
    .task {
      margin-top: 12px;
      border: 1px solid #d8e7f5;
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
    }
    .task-title {
      margin: 0 0 8px;
      font-weight: 700;
      color: #1f3347;
    }
    .task-text {
      margin: 6px 0;
      padding: 8px 10px;
      border: 1px solid #e2edf8;
      border-radius: 8px;
      background: #fbfdff;
      color: #2b445b;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .task-option {
      display: block;
      margin: 6px 0;
      padding: 8px 10px;
      border: 1px solid #e2edf8;
      border-radius: 8px;
      background: #fbfdff;
      color: #2b445b;
    }
    .dtz-ads-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .dtz-ad-card {
      border: 1px solid #d4e3f4;
      border-radius: 10px;
      background: #ffffff;
      padding: 8px 9px;
      display: grid;
      gap: 6px;
    }
    .dtz-ad-top {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .dtz-ad-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      border-radius: 7px;
      background: #eef5ff;
      border: 1px solid #c8daef;
      color: #1f4670;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }
    .dtz-ad-headline {
      margin: 0;
      color: #1c416b;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.35;
    }
    .dtz-ad-lines {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 3px;
    }
    .dtz-ad-line {
      color: #36597b;
      font-size: 0.79rem;
      line-height: 1.3;
    }
    .task-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #c8daef;
      border-radius: 9px;
      background: #ffffff;
      color: #24486f;
      font: inherit;
      font-weight: 700;
      padding: 7px 10px;
    }
    .dtz-dialog-task {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #dce8f6;
      border-radius: 10px;
      background: #fafdff;
    }
    .dtz-dialog-task h5 {
      margin: 0 0 8px;
      color: #1f3f63;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .dtz-wegweiser-board {
      border: 1px solid #c9d9ee;
      border-radius: 12px;
      background: linear-gradient(180deg, #fafdff 0%, #f2f8ff 100%);
      overflow: hidden;
      margin-top: 8px;
    }
    .dtz-wegweiser-head {
      padding: 8px 10px;
      border-bottom: 1px solid #d4e2f3;
      background: #ecf4ff;
      color: #183d67;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .dtz-wegweiser-table {
      display: grid;
      gap: 0;
    }
    .dtz-wegweiser-row {
      display: grid;
      grid-template-columns: 92px 98px minmax(0, 1fr) minmax(140px, 0.8fr);
      gap: 8px;
      align-items: start;
      padding: 8px 10px;
      border-bottom: 1px dashed #d3e2f4;
    }
    .dtz-wegweiser-row:last-child { border-bottom: 0; }
    .dtz-wegweiser-col-label {
      color: #496587;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }
    .dtz-wegweiser-level {
      color: #173b63;
      font-weight: 700;
      font-size: 0.93rem;
    }
    .dtz-wegweiser-range {
      color: #24486f;
      font-weight: 700;
      font-size: 0.86rem;
      border: 1px solid #c7d7ec;
      border-radius: 8px;
      background: #ffffff;
      padding: 4px 8px;
      display: inline-block;
      min-width: 68px;
      text-align: center;
    }
    .dtz-wegweiser-offices {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 4px;
    }
    .dtz-wegweiser-office {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1d3f65;
      font-size: 0.89rem;
      font-weight: 600;
    }
    .dtz-wegweiser-room {
      display: inline-flex;
      min-width: 40px;
      justify-content: center;
      align-items: center;
      border-radius: 6px;
      border: 1px solid #bfd3eb;
      background: #ffffff;
      color: #264b73;
      font-size: 0.74rem;
      font-weight: 700;
      padding: 1px 6px;
      letter-spacing: 0.02em;
    }
    .dtz-wegweiser-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .dtz-wegweiser-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #c4d8ef;
      background: #ffffff;
      color: #335576;
      font-size: 0.73rem;
      font-weight: 700;
      padding: 2px 8px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .primary-btn {
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 8px 14px;
      font: inherit;
      font-weight: 700;
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      cursor: pointer;
      width: 100%;
      display: block;
    }
    .section-trigger {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .section-trigger h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.35rem;
    }
    .section-trigger::after {
      content: "-";
      font-size: 1.2rem;
      line-height: 1;
      color: #3f5f80;
      font-weight: 700;
    }
    .card.section-collapsed .section-trigger::after { content: "+"; }
    .section-panel { margin-top: 12px; }
    .card.section-collapsed .section-panel { display: none; }
    @media (max-width: 820px) {
      .dtz-wegweiser-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .dtz-ads-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script defer src="/assets/site-shell.js"></script>
</head>
<body>
  <div class="page-shell">
    <main>
      <section id="lesenSection1" class="card section-collapsed">
        <button id="lesenSectionToggle1" class="section-trigger" type="button" aria-expanded="false"><h1>Lesen Teil 1</h1></button>
        <div class="section-panel">
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="1" type="button">Neue Aufgaben laden</button></div>
          <div id="statusBox1" class="status"></div>
          <div id="taskList1"></div>
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="1" type="button">Neue Aufgaben laden</button></div>
        </div>
      </section>

      <section id="lesenSection2" class="card section-collapsed">
        <button id="lesenSectionToggle2" class="section-trigger" type="button" aria-expanded="false"><h1>Lesen Teil 2</h1></button>
        <div class="section-panel">
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="2" type="button">Neue Aufgaben laden</button></div>
          <div id="statusBox2" class="status"></div>
          <div id="taskList2"></div>
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="2" type="button">Neue Aufgaben laden</button></div>
        </div>
      </section>

      <section id="lesenSection3" class="card section-collapsed">
        <button id="lesenSectionToggle3" class="section-trigger" type="button" aria-expanded="false"><h1>Lesen Teil 3</h1></button>
        <div class="section-panel">
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="3" type="button">Neue Aufgaben laden</button></div>
          <div id="statusBox3" class="status"></div>
          <div id="taskList3"></div>
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="3" type="button">Neue Aufgaben laden</button></div>
        </div>
      </section>

      <section id="lesenSection4" class="card section-collapsed">
        <button id="lesenSectionToggle4" class="section-trigger" type="button" aria-expanded="false"><h1>Lesen Teil 4</h1></button>
        <div class="section-panel">
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="4" type="button">Neue Aufgaben laden</button></div>
          <div id="statusBox4" class="status"></div>
          <div id="taskList4"></div>
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="4" type="button">Neue Aufgaben laden</button></div>
        </div>
      </section>

      <section id="lesenSection5" class="card section-collapsed">
        <button id="lesenSectionToggle5" class="section-trigger" type="button" aria-expanded="false"><h1>Lesen Teil 5</h1></button>
        <div class="section-panel">
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="5" type="button">Neue Aufgaben laden</button></div>
          <div id="statusBox5" class="status"></div>
          <div id="taskList5"></div>
          <div class="actions"><button class="primary-btn js-reload-btn" data-teil="5" type="button">Neue Aufgaben laden</button></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function setStatus(boxId, message, isError) {
      const box = document.getElementById(boxId);
      if (!box) return;
      box.style.display = message ? "block" : "none";
      box.textContent = message || "";
      box.style.borderColor = isError ? "#f3c1c6" : "#b8d5ec";
      box.style.background = isError ? "#fdecee" : "#f3f9ff";
      box.style.color = isError ? "#7a1f24" : "#2e4c67";
    }

    function addText(list, value) {
      const text = String(value || "").trim();
      if (!text) return;
      const p = document.createElement("div");
      p.className = "task-text";
      p.textContent = text;
      list.appendChild(p);
    }

    function addOptions(list, options) {
      const map = options && typeof options === "object" ? options : {};
      Object.keys(map).forEach(key => {
        const row = document.createElement("div");
        row.className = "task-option";
        row.textContent = `${key}) ${String(map[key] || "")}`;
        list.appendChild(row);
      });
    }

    function wegweiserRoomPrefix(floorLabel) {
      const floor = String(floorLabel || "").trim().toUpperCase();
      if (floor.includes("UG")) return "U";
      if (floor.includes("EG")) return "E";
      const digit = floor.match(/\d+/);
      if (digit) return digit[0].slice(0, 1);
      const letter = floor.replace(/[^A-ZÄÖÜ]/g, "").slice(0, 1);
      return letter || "R";
    }

    function buildWegweiserRows(wegweiserLines) {
      return (Array.isArray(wegweiserLines) ? wegweiserLines : [])
        .map((line, lineIndex) => {
          const raw = String(line || "").trim();
          if (!raw) return null;
          const match = raw.match(/^([^:|\-]+)\s*[:|-]\s*(.+)$/);
          const level = (match ? match[1] : `Ebene ${lineIndex + 1}`).trim();
          const tail = (match ? match[2] : raw).trim();
          const offices = tail.split(/\s*,\s*|\s*;\s*/).map((part) => part.trim()).filter(Boolean);
          const prefix = wegweiserRoomPrefix(level);
          const officeEntries = (offices.length ? offices : [tail]).map((office, idx) => {
            const room = `${prefix}${String(idx + 1).padStart(2, "0")}`;
            return { room, office };
          });
          const roomRange = officeEntries.length
            ? `${officeEntries[0].room}-${officeEntries[officeEntries.length - 1].room}`
            : `${prefix}01`;
          return {
            level,
            roomRange,
            offices: officeEntries,
            keywords: officeEntries.map((entry) => entry.office).slice(0, 4)
          };
        })
        .filter(Boolean);
    }

    function renderWegweiserBoard(title, wegweiserLines) {
      const rows = buildWegweiserRows(wegweiserLines);
      if (!rows.length) return null;

      const board = document.createElement("div");
      board.className = "dtz-wegweiser-board";
      const head = document.createElement("div");
      head.className = "dtz-wegweiser-head";
      head.textContent = String(title || "Wegweiser");
      board.appendChild(head);

      const table = document.createElement("div");
      table.className = "dtz-wegweiser-table";

      rows.forEach((row) => {
        const rowEl = document.createElement("div");
        rowEl.className = "dtz-wegweiser-row";

        const col1 = document.createElement("div");
        col1.innerHTML = `<div class="dtz-wegweiser-col-label">Etage</div><div class="dtz-wegweiser-level">${row.level}</div>`;
        rowEl.appendChild(col1);

        const col2 = document.createElement("div");
        col2.innerHTML = `<div class="dtz-wegweiser-col-label">Räume</div><div class="dtz-wegweiser-range">${row.roomRange}</div>`;
        rowEl.appendChild(col2);

        const col3 = document.createElement("div");
        const col3Label = document.createElement("div");
        col3Label.className = "dtz-wegweiser-col-label";
        col3Label.textContent = "Stellen";
        col3.appendChild(col3Label);
        const offices = document.createElement("ul");
        offices.className = "dtz-wegweiser-offices";
        row.offices.forEach((entry) => {
          const li = document.createElement("li");
          li.className = "dtz-wegweiser-office";
          li.innerHTML = `<span class="dtz-wegweiser-room">${entry.room}</span><span>${entry.office}</span>`;
          offices.appendChild(li);
        });
        col3.appendChild(offices);
        rowEl.appendChild(col3);

        const col4 = document.createElement("div");
        const col4Label = document.createElement("div");
        col4Label.className = "dtz-wegweiser-col-label";
        col4Label.textContent = "Schlagwörter";
        col4.appendChild(col4Label);
        const tags = document.createElement("div");
        tags.className = "dtz-wegweiser-tags";
        row.keywords.forEach((keyword) => {
          const tag = document.createElement("span");
          tag.className = "dtz-wegweiser-tag";
          tag.textContent = String(keyword || "");
          tags.appendChild(tag);
        });
        col4.appendChild(tags);
        rowEl.appendChild(col4);

        table.appendChild(rowEl);
      });

      board.appendChild(table);
      return board;
    }

    function renderTeil1(list, item) {
      addText(list, item.instructions || "");
      const wegweiser = Array.isArray(item.wegweiser) ? item.wegweiser : [];
      if (wegweiser.length) {
        const board = renderWegweiserBoard(String(item.wegweiser_title || "Wegweiser"), wegweiser);
        if (board) list.appendChild(board);
      }
      const situations = Array.isArray(item.situations) ? item.situations : [];
      situations.forEach((s, idx) => {
        const task = document.createElement("section");
        task.className = "task";
        const t = document.createElement("p");
        t.className = "task-title";
        t.textContent = `${idx + 1}. ${String(s.prompt || "")}`;
        task.appendChild(t);
        addOptions(task, s.options || {});
        list.appendChild(task);
      });
    }

    function renderTeil2(list, item) {
      addText(list, item.instructions || "");
      const ads = item && typeof item.ads === "object" ? item.ads : {};
      const adLabels = Object.keys(ads).sort();
      if (adLabels.length) {
        const adBlock = document.createElement("section");
        adBlock.className = "task";
        const adTitle = document.createElement("p");
        adTitle.className = "task-title";
        adTitle.textContent = "Anzeigen";
        adBlock.appendChild(adTitle);

        const grid = document.createElement("div");
        grid.className = "dtz-ads-grid";
        adLabels.forEach((label) => {
          const raw = String(ads[label] || "");
          const parts = raw.split("|").map((p) => p.trim()).filter(Boolean);
          const headline = parts.length ? parts[0] : raw;
          const lines = parts.length > 1 ? parts.slice(1) : [];
          const card = document.createElement("article");
          card.className = "dtz-ad-card";
          card.innerHTML = `
            <div class="dtz-ad-top">
              <span class="dtz-ad-label">${label}</span>
              <p class="dtz-ad-headline">${headline}</p>
            </div>
          `;
          if (lines.length) {
            const ul = document.createElement("ul");
            ul.className = "dtz-ad-lines";
            lines.forEach((line) => {
              const li = document.createElement("li");
              li.className = "dtz-ad-line";
              li.textContent = line;
              ul.appendChild(li);
            });
            card.appendChild(ul);
          }
          grid.appendChild(card);
        });
        adBlock.appendChild(grid);
        addText(adBlock, "Wählen Sie A-H. Wenn nichts passt, wählen Sie X.");
        list.appendChild(adBlock);
      }

      const selectLabels = [...adLabels, "X"];
      const situations = Array.isArray(item.situations) ? item.situations : [];
      situations.forEach((s, idx) => {
        const task = document.createElement("section");
        task.className = "task";
        const t = document.createElement("p");
        t.className = "task-title";
        t.textContent = `Situation ${String(s.no || idx + 1)}`;
        task.appendChild(t);
        addText(task, String(s.prompt || ""));
        const select = document.createElement("select");
        select.className = "task-select";
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "Bitte auswählen…";
        select.appendChild(defaultOption);
        selectLabels.forEach((label) => {
          const opt = document.createElement("option");
          opt.value = label;
          opt.textContent = label;
          select.appendChild(opt);
        });
        task.appendChild(select);
        list.appendChild(task);
      });
    }

    function renderTeil3(list, item) {
      addText(list, item.instructions || "");
      const blocks = Array.isArray(item.blocks) ? item.blocks : [];
      blocks.forEach((b, idx) => {
        const task = document.createElement("section");
        task.className = "task";
        const t = document.createElement("p");
        t.className = "task-title";
        t.textContent = `${String(b.title || `Text ${idx + 1}`)}`;
        task.appendChild(t);
        addText(task, b.text || "");
        if (b.true_false) {
          const tfWrap = document.createElement("div");
          tfWrap.className = "dtz-dialog-task";
          tfWrap.innerHTML = `<h5>${String((b.true_false && b.true_false.no) || "")}</h5>`;
          addText(tfWrap, String(b.true_false.statement || ""));
          addOptions(tfWrap, { A: "richtig", B: "falsch" });
          task.appendChild(tfWrap);
        }
        if (b.mc) {
          const mcWrap = document.createElement("div");
          mcWrap.className = "dtz-dialog-task";
          mcWrap.innerHTML = `<h5>${String((b.mc && b.mc.no) || "")}</h5>`;
          addText(mcWrap, String(b.mc.question || "Welche Antwort passt?"));
          addOptions(mcWrap, b.mc.options || {});
          task.appendChild(mcWrap);
        }
        list.appendChild(task);
      });
    }

    function renderTeil4(list, item) {
      addText(list, item.instructions || "");
      addText(list, item.text || "");
      const statements = Array.isArray(item.statements) ? item.statements : [];
      statements.forEach((s, idx) => {
        const task = document.createElement("section");
        task.className = "task";
        const t = document.createElement("p");
        t.className = "task-title";
        t.textContent = `${idx + 1}. ${String(s.statement || "")}`;
        task.appendChild(t);
        addOptions(task, { A: "Richtig", B: "Falsch" });
        list.appendChild(task);
      });
    }

    function renderTeil5(list, item) {
      addText(list, item.instructions || "");
      addText(list, item.text_template || "");
      if (item.example && item.example.options) {
        const ex = document.createElement("section");
        ex.className = "task";
        const t = document.createElement("p");
        t.className = "task-title";
        t.textContent = "Beispiel (0)";
        ex.appendChild(t);
        addOptions(ex, item.example.options || {});
        list.appendChild(ex);
      }
      const gaps = Array.isArray(item.gaps) ? item.gaps : [];
      gaps.forEach((g, idx) => {
        const task = document.createElement("section");
        task.className = "task";
        const t = document.createElement("p");
        t.className = "task-title";
        t.textContent = `${idx + 1}. Lücke ${String(g.no || "")}`;
        task.appendChild(t);
        addOptions(task, g.options || {});
        list.appendChild(task);
      });
    }

    function renderLesen(listId, statusId, teil, payload) {
      const list = document.getElementById(listId);
      if (!list) return;
      list.innerHTML = "";
      const set = payload && payload.set ? payload.set : {};
      const items = Array.isArray(set.items) ? set.items : [];
      const item = items[0] || null;
      if (!item) {
        setStatus(statusId, `Lesen Teil ${teil} görevleri bulunamadı.`, true);
        return;
      }

      if (teil === 1) renderTeil1(list, item);
      if (teil === 2) renderTeil2(list, item);
      if (teil === 3) renderTeil3(list, item);
      if (teil === 4) renderTeil4(list, item);
      if (teil === 5) renderTeil5(list, item);

      setStatus(statusId, "", false);
    }

    async function loadLesenTeil(teil) {
      const statusId = `statusBox${teil}`;
      const listId = `taskList${teil}`;
      setStatus(statusId, "", false);
      try {
        const response = await fetch(`./api/dtz_lesen_teil${teil}_public.php`, { method: "GET" });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload.ok) {
          throw new Error(String(payload.error || `Fehler: ${response.status}`));
        }
        renderLesen(listId, statusId, teil, payload);
      } catch (err) {
        setStatus(statusId, `Lesen Teil ${teil} yüklenemedi: ${String(err && err.message ? err.message : err)}`, true);
      }
    }

    document.querySelectorAll(".js-reload-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const teil = Number(btn.getAttribute("data-teil") || "1");
        void loadLesenTeil(teil);
      });
    });

    function bindSectionToggle(sectionId, toggleId) {
      const section = document.getElementById(sectionId);
      const toggle = document.getElementById(toggleId);
      if (!section || !toggle) return;
      toggle.addEventListener("click", () => {
        const collapsed = section.classList.toggle("section-collapsed");
        toggle.setAttribute("aria-expanded", String(!collapsed));
      });
    }

    bindSectionToggle("lesenSection1", "lesenSectionToggle1");
    bindSectionToggle("lesenSection2", "lesenSectionToggle2");
    bindSectionToggle("lesenSection3", "lesenSectionToggle3");
    bindSectionToggle("lesenSection4", "lesenSectionToggle4");
    bindSectionToggle("lesenSection5", "lesenSectionToggle5");

    void loadLesenTeil(1);
    void loadLesenTeil(2);
    void loadLesenTeil(3);
    void loadLesenTeil(4);
    void loadLesenTeil(5);
  </script>
</body>
</html>
