<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden | DTZ-LiD.de</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #dbeafe;
      --text: #1e293b;
      --text-muted: #64748b;
      --bg: #f8fafc;
      --white: #ffffff;
      --border: #e2e8f0;
      --error: #dc2626;
      --error-bg: #fef2f2;
      --success: #16a34a;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 40px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo a {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }

    .auth-subtitle {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .form-input.error {
      border-color: var(--error);
    }

    .error-message {
      color: var(--error);
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.visible {
      display: block;
    }

    .alert-error {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 2px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .auth-footer p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .trial-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: var(--success);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/">DTZ-LiD.de</a>
      </div>
      
      <div style="text-align: center;">
        <div class="trial-badge">
          ✨ 7 Tage kostenlos testen
        </div>
      </div>

      <h1 class="auth-title">Willkommen zurück</h1>
      <p class="auth-subtitle">Melde dich an, um weiterzulernen</p>

      <div id="alert" class="alert alert-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-Mail-Adresse</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="name@beispiel.de"
            required
          >
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Passwort</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="••••••••"
            required
          >
          <div class="error-message" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Anmelden
        </button>
      </form>

      <div class="auth-footer">
        <p>Noch kein Konto? <a href="/register.html">Kostenlos registrieren</a></p>
      </div>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script>
    // Redirect if already logged in
    redirectIfAuth();

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const alert = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear previous errors
      alert.classList.remove('visible');
      document.querySelectorAll('.error-message').forEach(el => {
        el.classList.remove('visible');
        el.textContent = '';
      });
      document.querySelectorAll('.form-input').forEach(el => {
        el.classList.remove('error');
      });

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Show loading
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span>Anmeldung...';

      try {
        const result = await api.login({ email, password });

        if (result.success) {
          window.location.href = '/dashboard.html';
        } else {
          // Show error
          alert.textContent = result.error || 'Anmeldung fehlgeschlagen';
          alert.classList.add('visible');
        }
      } catch (error) {
        alert.textContent = 'Ein Fehler ist aufgetreten. Bitte versuche es später erneut.';
        alert.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Anmelden';
      }
    });

    // Auto-fill email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    if (emailParam) {
      document.getElementById('email').value = emailParam;
    }
  </script>
</body>
</html>
