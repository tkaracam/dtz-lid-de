<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DTZ-LiD.de | Passwort vergessen</title>
  <style>
    html { background: #f6fbff; visibility: hidden; }
    html.page-ready { visibility: visible; }
  </style>
  <script>
    (() => {
      const show = () => requestAnimationFrame(() => document.documentElement.classList.add("page-ready"));
      const hide = () => document.documentElement.classList.remove("page-ready");
      if (document.readyState === "loading") {
        window.addEventListener("load", show, { once: true });
      } else {
        show();
      }
      window.addEventListener("pageshow", show);
      window.addEventListener("pagehide", hide);
      window.addEventListener("beforeunload", hide);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ora-bg: #f6fbff;
      --ora-surface: #ffffff;
      --ora-surface-soft: #f8fcff;
      --ora-text: #1f3142;
      --ora-muted: #587089;
      --ora-stroke: #d8e7f5;
      --ora-accent-a: #ff8a57;
      --ora-accent-b: #ff5f7f;
      --ora-accent-c: #36d5ff;
      --ora-shadow: 0 16px 36px rgba(35, 71, 108, 0.12);
      --ora-menu-text: #2b445b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ora-text);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(40rem 22rem at -8% -8%, rgba(255, 152, 112, 0.2), transparent 62%),
        radial-gradient(38rem 20rem at 108% 6%, rgba(54, 213, 255, 0.13), transparent 58%),
        var(--ora-bg);
    }

    h1, h2 { font-family: "Space Grotesk", sans-serif; }

    .container {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 90px) 0 60px;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) clamp(22px, 3.2vw, 38px) 14px clamp(10px, 1.4vw, 18px);
      border-top: 1px solid var(--ora-stroke);
      border-bottom: 1px solid var(--ora-stroke);
      background: #ffffff;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 1004;
    }

    .brand {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      color: #1f3347;
      text-decoration: none;
      font-size: 1.08rem;
    }

    .nav-actions {
      display: inline-flex;
      gap: 8px;
      margin-left: auto;
    }

    .quick-btn {
      text-decoration: none;
      color: var(--ora-menu-text);
      border: 1px solid var(--ora-stroke);
      background: var(--ora-surface-soft);
      padding: 6px 8px;
      border-radius: 10px;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1;
    }

    .quick-btn-primary {
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      border-color: transparent;
    }

    .card {
      margin-top: 18px;
      border-radius: 16px;
      padding: 22px;
      background: linear-gradient(160deg, #ffffff, #f5faff);
      border: 1px solid var(--ora-stroke);
      box-shadow: var(--ora-shadow);
      max-width: 620px;
    }

    p {
      color: var(--ora-muted);
      margin-top: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      color: #48657f;
    }

    input {
      width: 100%;
      border: 1px solid var(--ora-stroke);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      margin-bottom: 12px;
      background: #ffffff;
      color: var(--ora-text);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, .link-btn {
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid var(--ora-stroke);
      padding: 8px 14px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ora-menu-text);
      background: var(--ora-surface-soft);
      cursor: pointer;
    }

    .primary-btn {
      background: linear-gradient(95deg, var(--ora-accent-a), var(--ora-accent-b));
      color: #210f1a;
      border-color: transparent;
    }

    .status {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #b8d5ec;
      background: #f3f9ff;
      color: #2e4c67;
      display: none;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <a class="brand" href="./index.html">DTZ-LiD</a>
    <div class="nav-actions">
      <a class="quick-btn" href="./member.html?mode=login">Anmelden</a>
      <a class="quick-btn quick-btn-primary" href="./register.html">Registrieren</a>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Passwort vergessen</h1>
      <p>Geben Sie Ihre E-Mail-Adresse ein. Falls ein Konto existiert, wird ein Reset-Hinweis angezeigt.</p>
      <form id="forgotForm">
        <label for="forgotEmail">E-Mail</label>
        <input id="forgotEmail" type="email" autocomplete="email" required placeholder="name@example.com">
        <div class="actions">
          <button id="forgotSubmitBtn" class="primary-btn" type="submit">Reset-Link senden</button>
          <a class="link-btn" href="./member.html?mode=login">Zurück zu Anmelden</a>
        </div>
      </form>
      <div id="forgotStatus" class="status"></div>
    </section>
  </main>

  <script>
    const forgotForm = document.getElementById("forgotForm");
    const forgotStatus = document.getElementById("forgotStatus");
    if (forgotForm && forgotStatus) {
      forgotForm.addEventListener("submit", event => {
        event.preventDefault();
        const emailInput = document.getElementById("forgotEmail");
        const email = String((emailInput && emailInput.value) || "").trim();
        if (!email) return;
        forgotStatus.style.display = "block";
        forgotStatus.textContent = "Wenn diese E-Mail registriert ist, wurde ein Hinweis zur Passwort-Zurücksetzung vorbereitet.";
      });
    }
  </script>
</body>
</html>
