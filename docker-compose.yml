version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dtz-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_DRIVER=sqlite
      - DB_PATH=/var/www/html/database/dtz_production.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
      - ./logs:/var/log/apache2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
